<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f-tools · 前端小工具集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
    <style>
        :root {
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-900: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--gray-900);
            background: linear-gradient(135deg, var(--gray-50) 0%, #eff6ff 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 64px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--gray-500);
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-500);
            box-shadow: 0 8px 24px -8px rgba(59, 130, 246, 0.25);
        }

        .card .icon {
            font-size: 28px;
            line-height: 1;
        }

        .card h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .card p {
            font-size: 0.875rem;
            color: var(--gray-500);
            flex: 1;
        }

        .card .arrow {
            align-self: flex-end;
            color: var(--gray-300);
            font-size: 1.25rem;
            transition: all 0.2s ease;
        }

        .card:hover .arrow {
            color: var(--primary-500);
            transform: translateX(4px);
        }

        footer {
            margin-top: 48px;
            text-align: center;
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--gray-500);
            text-decoration: none;
            border-bottom: 1px solid var(--gray-300);
        }

        footer a:hover {
            color: var(--primary-600);
            border-color: var(--primary-500);
        }

        @media (max-width: 600px) {
            .container {
                padding: 32px 16px;
            }
            .header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>f-tools</h1>
            <p>一些自用的纯前端小工具</p>
        </header>

        <div class="grid">
            <a class="card" href="clipboard.html">
                <div class="icon">🔗</div>
                <h2>剪切板链接管理器</h2>
                <p>把名称和地址打包成富文本 / Markdown 链接，一键复制到剪切板。</p>
                <span class="arrow">→</span>
            </a>

            <a class="card" href="video-compare.html">
                <div class="icon">🎬</div>
                <h2>视频对比</h2>
                <p>拖入多个视频文件并排播放，可同步播放暂停，方便对比效果差异。</p>
                <span class="arrow">→</span>
            </a>

            <a class="card" href="image-compare.html">
                <div class="icon">🖼️</div>
                <h2>图片对比</h2>
                <p>多张图片平铺，鼠标移动时同步放大相同区域，逐像素查看细节。</p>
                <span class="arrow">→</span>
            </a>
        </div>

        <footer>
            <a href="https://github.com/hnl1/f-tools" target="_blank" rel="noopener">GitHub</a>
        </footer>
    </div>
</body>
</html>
