<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>视频对比</title>
    <script>
      (function () {
        var saved = null;
        try { saved = localStorage.getItem('f-tools-theme'); } catch (e) {}
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #111;
        --bg-drop: #142033;
        --text: #eee;
        --text-muted: #888;
        --text-faint: #666;
        --surface: #1a1a1a;
        --surface-2: #222;
        --surface-hover: #2a2a2a;
        --surface-hover-2: #3a3a3a;
        --border: #333;
        --border-strong: #444;
        --accent: #4aa3ff;
        --danger: #ff8a8a;
        --danger-border: #663030;
        --danger-hover-bg: #3a2020;
      }
      :root[data-theme="light"] {
        color-scheme: light;
        --bg: #f5f6f8;
        --bg-drop: #e0ecff;
        --text: #1f2937;
        --text-muted: #6b7280;
        --text-faint: #9ca3af;
        --surface: #ffffff;
        --surface-2: #f9fafb;
        --surface-hover: #f3f4f6;
        --surface-hover-2: #e5e7eb;
        --border: #e5e7eb;
        --border-strong: #d1d5db;
        --accent: #2563eb;
        --danger: #dc2626;
        --danger-border: #fca5a5;
        --danger-hover-bg: #fee2e2;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.4 -apple-system, "PingFang SC", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      body.dragging {
        outline: 3px dashed var(--accent);
        outline-offset: -8px;
        background: var(--bg-drop);
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        flex-shrink: 0;
      }
      h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 500;
      }
      .hint {
        color: var(--text-muted);
        font-size: 12px;
      }
      .controls {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .back-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        padding: 4px 8px;
        border-radius: 4px;
      }
      .back-link:hover {
        color: var(--text);
        background: var(--surface-hover);
      }
      button {
        background: var(--surface-hover);
        color: var(--text);
        border: 1px solid var(--border-strong);
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: var(--surface-hover-2);
      }
      button.danger {
        border-color: var(--danger-border);
        color: var(--danger);
      }
      #theme-toggle {
        padding: 6px 10px;
        font-size: 14px;
        line-height: 1;
      }
      .grid {
        display: grid;
        gap: 12px;
        flex: 1;
        min-height: 0;
      }
      .cell {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }
      .cell .title {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        font-weight: 500;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        flex-shrink: 0;
        cursor: grab;
        user-select: none;
      }
      .cell .title:active {
        cursor: grabbing;
      }
      .cell.dragging-cell {
        opacity: 0.4;
      }
      .cell.drag-over-left {
        box-shadow: -3px 0 0 0 var(--accent);
      }
      .cell.drag-over-right {
        box-shadow: 3px 0 0 0 var(--accent);
      }
      .cell .title .handle {
        color: var(--text-faint);
        font-size: 14px;
        line-height: 1;
      }
      .cell .title .name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cell .title .remove {
        cursor: pointer;
        color: var(--text-muted);
        padding: 0 4px;
        border-radius: 3px;
      }
      .cell .title .remove:hover {
        background: var(--danger-hover-bg);
        color: var(--danger);
      }
      video {
        flex: 1;
        min-height: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        display: block;
      }
      .empty {
        padding: 80px 24px;
        text-align: center;
        color: var(--text-faint);
        border: 2px dashed var(--border);
        border-radius: 8px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="back-link">← 返回</a>
      <h1>视频对比</h1>
      <span class="hint">从 Finder 拖动视频到此页面即可加入对比</span>
      <div class="controls">
        <button id="sync-toggle">同时播放</button>
        <button id="sync-reset">回到 0s</button>
        <button id="clear" class="danger">清空</button>
        <button id="theme-toggle" type="button" title="切换主题">🌙</button>
      </div>
    </header>

    <div id="grid" class="grid"></div>

    <script>
      (function setupThemeToggle() {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        function refresh() {
          const theme = document.documentElement.getAttribute("data-theme");
          btn.textContent = theme === "dark" ? "☀️" : "🌙";
          btn.title = theme === "dark" ? "切换到亮色" : "切换到暗色";
        }
        btn.addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme");
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          try { localStorage.setItem("f-tools-theme", next); } catch (e) {}
          refresh();
        });
        window.addEventListener("storage", (e) => {
          if (e.key === "f-tools-theme" && e.newValue) {
            document.documentElement.setAttribute("data-theme", e.newValue);
            refresh();
          }
        });
        refresh();
      })();

      const grid = document.getElementById("grid");
      const items = [];

      function render() {
        grid.innerHTML = "";
        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "把视频文件拖进来开始对比";
          grid.style.gridTemplateColumns = "1fr";
          grid.appendChild(empty);
          return;
        }
        grid.style.gridTemplateColumns = `repeat(${items.length}, minmax(0, 1fr))`;
        items.forEach((item, idx) => {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.idx = String(idx);

          const title = document.createElement("div");
          title.className = "title";
          title.draggable = true;
          title.title = "拖动调整顺序";

          const handle = document.createElement("span");
          handle.className = "handle";
          handle.textContent = "⋮⋮";

          const name = document.createElement("span");
          name.className = "name";
          name.textContent = item.name;
          name.title = item.name;

          const remove = document.createElement("span");
          remove.className = "remove";
          remove.textContent = "✕";
          remove.title = "移除";
          remove.addEventListener("click", () => {
            URL.revokeObjectURL(item.url);
            items.splice(idx, 1);
            render();
          });

          title.appendChild(handle);
          title.appendChild(name);
          title.appendChild(remove);

          title.addEventListener("dragstart", (e) => {
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData(CELL_MIME, String(idx));
            cell.classList.add("dragging-cell");
          });
          title.addEventListener("dragend", () => {
            cell.classList.remove("dragging-cell");
            clearDropMarkers();
          });

          cell.addEventListener("dragover", (e) => {
            if (!isCellDrag(e)) return;
            e.preventDefault();
            e.stopPropagation();
            e.dataTransfer.dropEffect = "move";
            const rect = cell.getBoundingClientRect();
            const before = e.clientX < rect.left + rect.width / 2;
            clearDropMarkers();
            cell.classList.add(before ? "drag-over-left" : "drag-over-right");
          });
          cell.addEventListener("dragleave", (e) => {
            if (e.target === cell) {
              cell.classList.remove("drag-over-left", "drag-over-right");
            }
          });
          cell.addEventListener("drop", (e) => {
            if (!isCellDrag(e)) return;
            e.preventDefault();
            e.stopPropagation();
            const from = Number(e.dataTransfer.getData(CELL_MIME));
            const rect = cell.getBoundingClientRect();
            const before = e.clientX < rect.left + rect.width / 2;
            let to = idx + (before ? 0 : 1);
            clearDropMarkers();
            if (Number.isNaN(from) || from === to || from + 1 === to) return;
            const [moved] = items.splice(from, 1);
            if (from < to) to -= 1;
            items.splice(to, 0, moved);
            render();
          });

          const video = document.createElement("video");
          video.controls = true;
          video.preload = "metadata";
          video.src = item.url;

          cell.appendChild(title);
          cell.appendChild(video);
          grid.appendChild(cell);
        });
      }

      const CELL_MIME = "application/x-cell-index";

      function isCellDrag(e) {
        return e.dataTransfer && Array.from(e.dataTransfer.types).includes(CELL_MIME);
      }

      function clearDropMarkers() {
        document
          .querySelectorAll(".drag-over-left, .drag-over-right")
          .forEach((el) => el.classList.remove("drag-over-left", "drag-over-right"));
      }

      function sortItems() {
        items.sort((a, b) =>
          a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" }),
        );
      }

      function addFiles(fileList) {
        const files = Array.from(fileList).filter(
          (f) => f.type.startsWith("video/") || /\.(mp4|mov|webm|mkv|m4v)$/i.test(f.name),
        );
        if (files.length === 0) return;
        files.forEach((f) => {
          items.push({ name: f.name, url: URL.createObjectURL(f) });
        });
        sortItems();
        render();
      }

      window.addEventListener("dragover", (e) => {
        if (isCellDrag(e)) return;
        e.preventDefault();
        document.body.classList.add("dragging");
      });
      window.addEventListener("dragleave", (e) => {
        if (e.target === document.documentElement || e.relatedTarget === null) {
          document.body.classList.remove("dragging");
        }
      });
      window.addEventListener("drop", (e) => {
        if (isCellDrag(e)) return;
        e.preventDefault();
        document.body.classList.remove("dragging");
        if (e.dataTransfer && e.dataTransfer.files) {
          addFiles(e.dataTransfer.files);
        }
      });

      const toggleBtn = document.getElementById("sync-toggle");

      function refreshToggleLabel() {
        const anyPlaying = Array.from(document.querySelectorAll("video")).some(
          (v) => !v.paused && !v.ended,
        );
        toggleBtn.textContent = anyPlaying ? "同时暂停" : "同时播放";
      }

      toggleBtn.addEventListener("click", () => {
        const videos = document.querySelectorAll("video");
        const anyPlaying = Array.from(videos).some((v) => !v.paused && !v.ended);
        videos.forEach((v) => (anyPlaying ? v.pause() : v.play()));
        refreshToggleLabel();
      });

      document.addEventListener("play", refreshToggleLabel, true);
      document.addEventListener("pause", refreshToggleLabel, true);
      document.addEventListener("ended", refreshToggleLabel, true);

      document.getElementById("sync-reset").addEventListener("click", () => {
        document.querySelectorAll("video").forEach((v) => {
          v.pause();
          v.currentTime = 0;
        });
        refreshToggleLabel();
      });
      document.getElementById("clear").addEventListener("click", () => {
        items.forEach((it) => URL.revokeObjectURL(it.url));
        items.length = 0;
        render();
      });

      render();
    </script>
  </body>
</html>
