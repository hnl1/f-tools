<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f-tools · 隐藏入口</title>
    <script src="assets/theme-toggle.js"></script>
    <style>
        :root[data-theme="light"] {
            color-scheme: light;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --bg-grad-from: #f8fafc;
            --bg-grad-to: #eff6ff;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 8px 24px -8px rgba(59, 130, 246, 0.25);
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --primary-500: #60a5fa;
            --primary-600: #3b82f6;
            --primary-700: #2563eb;
            --bg-grad-from: #0b1220;
            --bg-grad-to: #111827;
            --surface: #1e293b;
            --border: #334155;
            --border-strong: #475569;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 24px -8px rgba(96, 165, 250, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-grad-from) 0%, var(--bg-grad-to) 100%);
            font-family: var(--ft-font);
            line-height: 1.6;
        }

        .container {
            width: min(720px, calc(100vw - 48px));
            margin: 0 auto;
            padding: 64px 0;
            position: relative;
        }

        .theme-toggle-host {
            position: absolute;
            top: 20px;
            left: 0;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px;
            color: inherit;
            text-decoration: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-500);
            box-shadow: var(--shadow-hover);
        }

        .card-icon {
            width: 32px;
            height: 32px;
            color: var(--text);
        }

        .card-icon::before {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
            background: currentColor;
            -webkit-mask: var(--icon-trash) center / contain no-repeat;
            mask: var(--icon-trash) center / contain no-repeat;
        }

        .card h2 {
            color: var(--text);
            font-size: 1.125rem;
            font-weight: 600;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .card .arrow {
            align-self: flex-end;
            color: var(--border-strong);
            font-size: 1.25rem;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .card:hover .arrow {
            color: var(--primary-500);
            transform: translateX(4px);
        }
    </style>
    <link rel="stylesheet" href="assets/common.css">
</head>
<body class="home-page">
    <div class="container">
        <div class="theme-toggle-host" id="theme-toggle-host"></div>
        <header class="header">
            <h1>隐藏入口</h1>
            <p>不放在主首页上的自用入口。</p>
        </header>

        <div class="grid">
            <a class="card" href="tools/icons.html">
                <span class="card-icon" aria-hidden="true"></span>
                <h2>图标预览</h2>
                <p>查看共享图标变量当前的绘制效果。</p>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <script>
        document.getElementById('theme-toggle-host').appendChild(ThemeToggle.create());
    </script>
</body>
</html>
