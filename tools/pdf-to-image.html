<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 转图片版</title>
<script>
  (function () {
    var pref = null;
    try { pref = localStorage.getItem('f-tools-theme'); } catch (e) {}
    if (pref !== 'light' && pref !== 'dark') pref = 'auto';
    var actual = pref === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : pref;
    document.documentElement.setAttribute('data-theme', actual);
    document.documentElement.setAttribute('data-theme-pref', pref);
  })();
</script>
<style>

    color-scheme: dark;
    --bg: #1e1e1e;
    --text: #ddd;
    --text-muted: #aaa;
    --text-faint: #888;
    --header-bg: #252525;

    --border: #333;
    --button-bg: #3a3a3a;

  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #fafafa;
    --text: #1f2937;
    --text-muted: #4b5563;
    --text-faint: #6b7280;
    --header-bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #f3f4f6;
    --border: #e5e7eb;
    --button-bg: #ffffff;
    --button-border: #d1d5db;
    --button-hover: #f3f4f6;

    --accent-strong: #1d4ed8;
    --accent-tint: rgba(37, 99, 235, 0.06);
    --danger: #dc2626;
    --preview-bg: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  header {
    flex: 0 0 auto;
    padding: 8px 14px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    white-space: normal;
    z-index: 10;
  }
  header h1 {
    font-size: 14px;

  }
  header .back-link {

  .panel {

  .form {

</style>

<body class="tool-page">
<header>
  <a href="../index.html" class="back-link" aria-label="主页" title="主页"></a>
  <h1>PDF 转图片版</h1>
  <div class="spacer"></div>
  <div class="header-toolbar" aria-label="批量转换操作">
    <div class="actions">
      <button class="button" id="add-pdf-btn" type="button" hidden>添加 PDF</button>
      <button class="button primary" id="generate-all-btn" type="button" disabled>转换</button>
      <button class="button" id="download-all-btn" type="button" disabled>下载</button>
    </div>
  </div>
  <button id="theme-toggle" type="button" title="切换主题">🌙</button>

<main>
  <section class="panel upload-panel">
    <div class="form">
      <div id="drop-hint" class="file-drop-zone" role="button" tabindex="0" aria-labelledby="pdf-to-image-drop-title">
        <input id="pdf-file" class="visually-hidden-file" type="file" accept="application/pdf,.pdf" multiple aria-label="选择 PDF 文件">
        <div class="file-drop-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">

            <path d="m7 9 5-5 5 5"></path>
            <path d="M5 18v2h14v-2"></path>
          </svg>
        </div>
        <div>
          <div id="pdf-to-image-drop-title" class="file-drop-title">拖入、粘贴或点击添加 PDF</div>
        </div>

<script src="../vendor/pdfjs/pdf.min.js"></script>
<script src="../vendor/jspdf/jspdf.umd.min.js"></script>
<script src="../assets/file-input.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = '../vendor/pdfjs/pdf.worker.min.js';

(() => {
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    const mql = window.matchMedia('(prefers-color-scheme: dark)');
    const ICONS = {
      auto: { icon: '🖥️', title: '跟随系统（点击切到亮色）' },
      light: { icon: '☀️', title: '亮色（点击切到暗色）' },
      dark: { icon: '🌙', title: '暗色（点击切到跟随系统）' },
    };
    const getPref = () => {
      let p = null;
      try { p = localStorage.getItem('f-tools-theme'); } catch (e) {}
      return p === 'light' || p === 'dark' ? p : 'auto';
    };
    const apply = (pref) => {
      const actual = pref === 'auto' ? (mql.matches ? 'dark' : 'light') : pref;
      document.documentElement.setAttribute('data-theme', actual);
      document.documentElement.setAttribute('data-theme-pref', pref);
      themeBtn.textContent = ICONS[pref].icon;
      themeBtn.title = ICONS[pref].title;
    };
    const setPref = (p) => {
      try {
        if (p === 'auto') localStorage.removeItem('f-tools-theme');
        else localStorage.setItem('f-tools-theme', p);
      } catch (e) {}
      apply(p);
    };
    themeBtn.addEventListener('click', () => {
      const cur = getPref();
      setPref(cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto');
    });
    mql.addEventListener('change', () => {
      if (getPref() === 'auto') apply('auto');
    });
    window.addEventListener('storage', (e) => {
      if (e.key !== 'f-tools-theme') return;
      apply(getPref());
    });
    apply(getPref());
  }

  const fileInput = document.getElementById('pdf-file');
  const dropHint = document.getElementById('drop-hint');
  const dropStatus = document.getElementById('pdf-to-image-drop-status');
  const addPdfBtn = document.getElementById('add-pdf-btn');
  const generateAllBtn = document.getElementById('generate-all-btn');
  const downloadAllBtn = document.getElementById('download-all-btn');
  const pdfList = document.getElementById('pdf-list');
  const logEl = document.getElementById('log');
  const RENDER_SCALE = 2;

  /** @type {{id:string, file:File, status:string, outputBlob:Blob|null, outputName:string, compareUrl:string, error:string, elements:any}[]} */
  let items = [];
  let nextItemId = 1;
  let isGenerating = false;

  function log(message, isError = false) {
    if (!logEl) return;
    logEl.textContent = message;
    logEl.classList.toggle('error', isError);
  }

  function isPdfFile(file) {
    return Boolean(file) && (
      file.type === 'application/pdf' ||
      /\.pdf$/i.test(file.name || '')
    );
  }

  function makeOutputName(fileName) {
    const baseName = (fileName || 'converted').replace(/\.pdf$/i, '');
    return `${baseName}-images.pdf`;
  }

  function updateGlobalControls() {
    const hasItems = items.length > 0;
    const hasGenerated = items.some((item) => item.outputBlob);
    addPdfBtn.hidden = !hasItems;
    generateAllBtn.disabled = !hasItems || isGenerating;
    downloadAllBtn.disabled = !hasGenerated || isGenerating;
    pdfList.hidden = !hasItems;
    dropHint.classList.toggle('compact', hasItems);
  }

  function setItemStatus(item, status, message, isError = false) {
    item.status = status;
    item.error = isError ? message : '';
    item.elements.status.textContent = message;
    item.elements.status.hidden = !message;
    item.elements.status.classList.toggle('error', isError);
    item.elements.generateBtn.disabled = isGenerating || status === 'generating';
    item.elements.downloadBtn.hidden = !item.outputBlob;
    item.elements.compareBtn.hidden = !item.compareUrl;
    updateGlobalControls();
  }

  function addPdfFiles(files, sourceLabel) {
    const pdfFiles = Array.from(files || []).filter(isPdfFile);
    if (!pdfFiles.length) {
      log(`${sourceLabel}的文件不是 PDF，请使用 .pdf 文件。`, true);
      return;
    }

    pdfFiles.forEach(addPdfItem);
    log(`已${sourceLabel} ${pdfFiles.length} 个 PDF，可单独转换或点击“转换”。`);
    updateGlobalControls();
  }

  function addPdfItem(file) {
    const item = {
      id: `pdf-item-${nextItemId++}`,
      file,
      status: 'pending',
      outputBlob: null,
      outputName: makeOutputName(file.name),
      compareUrl: '',
      error: '',
      elements: {},
    };

    const row = document.createElement('div');
    row.className = 'pdf-item';
    row.dataset.itemId = item.id;

    const info = document.createElement('div');
    info.className = 'pdf-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'pdf-name';
    nameEl.textContent = file.name || '未命名 PDF';
    nameEl.title = nameEl.textContent;

    const statusEl = document.createElement('div');
    statusEl.className = 'pdf-status';
    statusEl.hidden = true;

    info.appendChild(nameEl);
    info.appendChild(statusEl);

    const actions = document.createElement('div');
    actions.className = 'pdf-actions';

    const generateBtn = document.createElement('button');
    generateBtn.className = 'button primary';
    generateBtn.type = 'button';
    generateBtn.textContent = '转换';

    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'button';
    downloadBtn.type = 'button';
    downloadBtn.textContent = '下载';
    downloadBtn.hidden = true;

    const compareBtn = document.createElement('button');
    compareBtn.className = 'button';
    compareBtn.type = 'button';
    compareBtn.textContent = '比较';
    compareBtn.hidden = true;

    actions.appendChild(generateBtn);
    actions.appendChild(downloadBtn);
    actions.appendChild(compareBtn);
    row.appendChild(info);
    row.appendChild(actions);
    pdfList.appendChild(row);

    item.elements = { row, status: statusEl, generateBtn, downloadBtn, compareBtn };
    items.push(item);

    generateBtn.addEventListener('click', () => generateOne(item));
    downloadBtn.addEventListener('click', () => {
      if (item.outputBlob) downloadBlob(item.outputBlob, item.outputName);
    });
    compareBtn.addEventListener('click', () => {
      if (item.compareUrl) window.open(item.compareUrl, '_blank', 'noopener');
    });
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  function openTransferDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('f-tools-pdf-transfer', 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains('transfers')) {
          db.createObjectStore('transfers', { keyPath: 'id' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function putTransfer(record) {
    const db = await openTransferDb();
    try {
      await new Promise((resolve, reject) => {
        const tx = db.transaction('transfers', 'readwrite');
        tx.objectStore('transfers').put(record);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
  }

  function makeTransferId() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  }

  async function storeForCompare(sourceFile, outputBlob, outputName) {
    const id = makeTransferId();
    await putTransfer({
      id,
      createdAt: Date.now(),
      files: [
        {
          name: sourceFile.name,
          type: sourceFile.type || 'application/pdf',
          blob: sourceFile.slice(0, sourceFile.size, sourceFile.type || 'application/pdf'),
        },
        {
          name: outputName,
          type: 'application/pdf',
          blob: outputBlob,
        },
      ],
    });
    return `pdf-compare.html?from=pdf-to-image.html&transfer=${encodeURIComponent(id)}`;
  }

  async function renderPageToImage(page, scale) {
    const outputViewport = page.getViewport({ scale: 1 });
    const renderViewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { alpha: false });

    canvas.width = Math.ceil(renderViewport.width);
    canvas.height = Math.ceil(renderViewport.height);

    context.fillStyle = '#fff';
    context.fillRect(0, 0, canvas.width, canvas.height);

    await page.render({
      canvasContext: context,
      viewport: renderViewport,
      background: 'white',
    }).promise;

    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

    return {
      dataUrl,
      width: outputViewport.width,
      height: outputViewport.height,
    };
  }

  async function convertPdfToImagePdf(file, onProgress) {
    const arrayBuffer = await file.arrayBuffer();
    const sourcePdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
    const { jsPDF } = window.jspdf;
    let outputPdf = null;

    for (let pageNumber = 1; pageNumber <= sourcePdf.numPages; pageNumber += 1) {
      onProgress(pageNumber, sourcePdf.numPages);

      const page = await sourcePdf.getPage(pageNumber);
      const image = await renderPageToImage(page, RENDER_SCALE);
      const orientation = image.width > image.height ? 'landscape' : 'portrait';

      if (!outputPdf) {
        outputPdf = new jsPDF({
          unit: 'pt',
          format: [image.width, image.height],
          orientation,
          compress: true,
        });
      } else {
        outputPdf.addPage([image.width, image.height], orientation);
      }

      outputPdf.addImage(
        image.dataUrl,
        'JPEG',
        0,
        0,
        image.width,
        image.height,
        undefined,
        'FAST'
      );
    }

    try { await sourcePdf.destroy(); } catch (_) {}

    const blob = outputPdf.output('blob');
    return blob;
  }

  async function saveGeneratedResultForCompare(item, blob) {
    item.outputBlob = blob;
    item.outputName = makeOutputName(item.file.name);
    item.compareUrl = '';

    try {
      item.compareUrl = await storeForCompare(item.file, blob, item.outputName);
      return true;
    } catch (error) {
      console.warn('prepare compare transfer failed', error);
      return false;
    }
  }

  async function generateOne(item) {
    if (!item || isGenerating) return;

    isGenerating = true;
    setAllItemButtonsDisabled(true);
    item.outputBlob = null;
    item.compareUrl = '';
    setItemStatus(item, 'generating', '转换中...');
    log(`正在转换：${item.file.name}`);

    try {
      const blob = await convertPdfToImagePdf(item.file, (pageNumber, pageCount) => {
        const message = `转换中：第 ${pageNumber} / ${pageCount} 页`;
        item.elements.status.textContent = message;
        log(`${item.file.name}\n${message}`);
      });
      const canCompare = await saveGeneratedResultForCompare(item, blob);
      setItemStatus(
        item,
        'generated',
        canCompare
          ? `已转换：${item.outputName}`
          : `已转换：${item.outputName}（比较准备失败，可下载后拖入对比页）`
      );
      log(canCompare
        ? `完成：${item.outputName}\n不会自动下载，可点击“下载”或“比较”。`
        : `完成：${item.outputName}\n不会自动下载；比较入口准备失败，可下载后拖入 PDF 对比页。`);
    } catch (error) {
      console.error(error);
      setItemStatus(item, 'error', '转换失败：' + (error && error.message ? error.message : String(error)), true);
      log(`${item.file.name} 转换失败：` + (error && error.message ? error.message : String(error)), true);
    } finally {
      isGenerating = false;
      setAllItemButtonsDisabled(false);
      updateGlobalControls();
    }
  }

  async function generateAll() {
    if (isGenerating || !items.length) return;

    isGenerating = true;
    setAllItemButtonsDisabled(true);
    updateGlobalControls();
    log(`开始转换，共 ${items.length} 个 PDF。`);

    try {
      for (let index = 0; index < items.length; index += 1) {
        const item = items[index];
        item.outputBlob = null;
        item.compareUrl = '';
        setItemStatus(item, 'generating', `转换中...（${index + 1} / ${items.length}）`);
        log(`正在转换 ${index + 1} / ${items.length}：${item.file.name}`);

        try {
          const blob = await convertPdfToImagePdf(item.file, (pageNumber, pageCount) => {
            const message = `转换中：第 ${pageNumber} / ${pageCount} 页`;
            item.elements.status.textContent = `${message}（${index + 1} / ${items.length}）`;
            log(`${item.file.name}\n${message}\n队列：${index + 1} / ${items.length}`);
          });
          const canCompare = await saveGeneratedResultForCompare(item, blob);
          setItemStatus(
            item,
            'generated',
            canCompare
              ? `已转换：${item.outputName}`
              : `已转换：${item.outputName}（比较准备失败，可下载后拖入对比页）`
          );
        } catch (error) {
          console.error(error);
          setItemStatus(item, 'error', '转换失败：' + (error && error.message ? error.message : String(error)), true);
        }
      }
      log('转换完成。不会自动下载，可点击“下载”或单项下载。');
    } finally {
      isGenerating = false;
      setAllItemButtonsDisabled(false);
      updateGlobalControls();
    }
  }

  function setAllItemButtonsDisabled(disabled) {
    items.forEach((item) => {
      item.elements.generateBtn.disabled = disabled;
      item.elements.downloadBtn.disabled = disabled;
      item.elements.compareBtn.disabled = disabled;
    });
  }

  function downloadAllGenerated() {
    const generatedItems = items.filter((item) => item.outputBlob);
    generatedItems.forEach((item) => downloadBlob(item.outputBlob, item.outputName));
    log(`已触发 ${generatedItems.length} 个文件下载。`);
  }

  addPdfBtn.addEventListener('click', () => fileInput.click());
  generateAllBtn.addEventListener('click', generateAll);
  downloadAllBtn.addEventListener('click', downloadAllGenerated);

  FileInputDropZone.bind({
    zone: '#drop-hint',
    input: fileInput,
    triggerElement: dropHint,
    status: dropStatus,
    rejectedText: '文件不是 PDF，请使用 .pdf 文件。',
    multiple: true,
    onFiles(files, detail) {
      addPdfFiles(files, detail.sourceLabel);
    },
  });

  updateGlobalControls();
})();
</script>
</body>
</html>
