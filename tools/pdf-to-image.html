<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 转图片版 PDF</title>
<script>
  (function () {
    var pref = null;
    try { pref = localStorage.getItem('f-tools-theme'); } catch (e) {}
    if (pref !== 'light' && pref !== 'dark') pref = 'auto';
    var actual = pref === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : pref;
    document.documentElement.setAttribute('data-theme', actual);
    document.documentElement.setAttribute('data-theme-pref', pref);
  })();
</script>
<style>
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #1e1e1e;
    --text: #ddd;
    --text-muted: #aaa;
    --text-faint: #888;
    --header-bg: #252525;
    --surface: #252525;
    --surface-soft: #1a1a1a;
    --border: #333;
    --button-bg: #3a3a3a;
    --button-border: #555;
    --button-hover: #4a4a4a;
    --accent: #4a9eff;
    --accent-strong: #2f7edb;
    --accent-tint: rgba(74, 158, 255, 0.08);
    --danger: #f87171;
    --preview-bg: #111;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #fafafa;
    --text: #1f2937;
    --text-muted: #4b5563;
    --text-faint: #6b7280;
    --header-bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #f3f4f6;
    --border: #e5e7eb;
    --button-bg: #ffffff;
    --button-border: #d1d5db;
    --button-hover: #f3f4f6;
    --accent: #2563eb;
    --accent-strong: #1d4ed8;
    --accent-tint: rgba(37, 99, 235, 0.06);
    --danger: #dc2626;
    --preview-bg: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  header {
    flex: 0 0 auto;
    padding: 8px 14px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    white-space: nowrap;
    overflow-x: auto;
    z-index: 10;
  }
  header h1 {
    font-size: 14px;
    margin: 0;
    font-weight: 500;
    flex: 0 0 auto;
  }
  header .back-link {
    color: var(--text-faint);
    text-decoration: none;
    font-size: 13px;
    padding: 2px 6px;
    border-radius: 4px;
    flex: 0 0 auto;
  }
  header .back-link:hover {
    color: var(--text);
    background: var(--button-hover);
  }
  header .spacer {
    flex: 1 1 auto;
  }
  button,
  input,
  select {
    font: inherit;
  }
  header button,
  .button {
    background: var(--button-bg);
    color: var(--text);
    border: 1px solid var(--button-border);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  header button:hover,
  .button:hover {
    background: var(--button-hover);
  }
  #theme-toggle {
    padding: 3px 8px;
    font-size: 13px;
    line-height: 1;
  }
  main {
    width: min(1040px, 100%);
    margin: 0 auto;
    padding: 28px 20px 40px;
    display: grid;
    grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
    gap: 20px;
  }
  .panel,
  .preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel {
    align-self: start;
  }
  .panel-head,
  .preview-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-head h2,
  .preview-head h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
  }
  .panel-head p,
  .preview-head p {
    margin: 6px 0 0;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.5;
  }
  .form {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  label span {
    color: var(--text);
    font-weight: 500;
  }
  input[type="file"],
  input[type="number"],
  select {
    width: 100%;
    background: var(--button-bg);
    color: var(--text);
    border: 1px solid var(--button-border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .hint {
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.5;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
  }
  .button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .button.primary:hover {
    background: var(--accent-strong);
  }
  .button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .button[hidden] {
    display: none;
  }
  #log {
    margin: 2px 16px 16px;
    min-height: 72px;
    padding: 12px;
    border-radius: 8px;
    background: var(--surface-soft);
    color: var(--text-muted);
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  #log.error {
    color: var(--danger);
  }
  .preview-body {
    min-height: 420px;
    padding: 16px;
    background: var(--preview-bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: auto;
  }
  #preview-canvas {
    display: none;
    max-width: 100%;
    height: auto;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
  }
  .empty-preview {
    color: var(--text-faint);
    font-size: 14px;
    align-self: center;
    text-align: center;
  }
  .preview.has-content .empty-preview {
    display: none;
  }
  .preview.has-content #preview-canvas {
    display: block;
  }
  @media (max-width: 820px) {
    main {
      grid-template-columns: 1fr;
      padding: 18px 12px 28px;
    }
  }
</style>
<link rel="stylesheet" href="../assets/common.css">
</head>
<body class="tool-page">
<header>
  <a href="../index.html" class="back-link">← 返回</a>
  <h1>PDF 转图片版 PDF</h1>
  <div class="spacer"></div>
  <button id="theme-toggle" type="button" title="切换主题">🌙</button>
</header>

<main>
  <section class="panel">
    <div class="panel-head">
      <h2>生成图片版 PDF</h2>
      <p>把每页 PDF 渲染成图片，再重新封装成 PDF，适合验证“图片化”后的展示效果。</p>
    </div>
    <div class="form">
      <label for="pdf-file">
        <span>选择 PDF</span>
        <input id="pdf-file" type="file" accept="application/pdf,.pdf">
      </label>

      <label for="scale">
        <span>渲染倍率</span>
        <input id="scale" type="number" min="1" max="5" step="0.5" value="2">
        <small class="hint">倍率越高越清晰，生成文件也越大。</small>
      </label>

      <label for="format">
        <span>图片格式</span>
        <select id="format">
          <option value="JPEG" selected>JPEG，高质量，文件较小</option>
          <option value="PNG">PNG，无损，文件较大</option>
        </select>
      </label>

      <label for="quality">
        <span>JPEG 质量</span>
        <input id="quality" type="number" min="0.1" max="1" step="0.05" value="0.95">
      </label>

      <div class="actions">
        <button class="button primary" id="convert-btn" type="button">生成并下载</button>
        <button class="button" id="compare-btn" type="button" hidden>去 PDF 对比</button>
      </div>
    </div>
    <div id="log">等待选择 PDF...</div>
  </section>

  <section class="preview" id="preview">
    <div class="preview-head">
      <h2>第一页预览</h2>
      <p>转换时会把第一页同步渲染到这里，方便快速检查清晰度和背景。</p>
    </div>
    <div class="preview-body">
      <div class="empty-preview">生成后显示预览</div>
      <canvas id="preview-canvas"></canvas>
    </div>
  </section>
</main>

<script src="../vendor/pdfjs/pdf.min.js"></script>
<script src="../vendor/jspdf/jspdf.umd.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = '../vendor/pdfjs/pdf.worker.min.js';

(() => {
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    const mql = window.matchMedia('(prefers-color-scheme: dark)');
    const ICONS = {
      auto: { icon: '🖥️', title: '跟随系统（点击切到亮色）' },
      light: { icon: '☀️', title: '亮色（点击切到暗色）' },
      dark: { icon: '🌙', title: '暗色（点击切到跟随系统）' },
    };
    const getPref = () => {
      let p = null;
      try { p = localStorage.getItem('f-tools-theme'); } catch (e) {}
      return p === 'light' || p === 'dark' ? p : 'auto';
    };
    const apply = (pref) => {
      const actual = pref === 'auto' ? (mql.matches ? 'dark' : 'light') : pref;
      document.documentElement.setAttribute('data-theme', actual);
      document.documentElement.setAttribute('data-theme-pref', pref);
      themeBtn.textContent = ICONS[pref].icon;
      themeBtn.title = ICONS[pref].title;
    };
    const setPref = (p) => {
      try {
        if (p === 'auto') localStorage.removeItem('f-tools-theme');
        else localStorage.setItem('f-tools-theme', p);
      } catch (e) {}
      apply(p);
    };
    themeBtn.addEventListener('click', () => {
      const cur = getPref();
      setPref(cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto');
    });
    mql.addEventListener('change', () => {
      if (getPref() === 'auto') apply('auto');
    });
    window.addEventListener('storage', (e) => {
      if (e.key !== 'f-tools-theme') return;
      apply(getPref());
    });
    apply(getPref());
  }

  const fileInput = document.getElementById('pdf-file');
  const convertBtn = document.getElementById('convert-btn');
  const compareBtn = document.getElementById('compare-btn');
  const scaleInput = document.getElementById('scale');
  const formatInput = document.getElementById('format');
  const qualityInput = document.getElementById('quality');
  const logEl = document.getElementById('log');
  const preview = document.getElementById('preview');
  const previewCanvas = document.getElementById('preview-canvas');
  const previewContext = previewCanvas.getContext('2d');

  let compareUrl = '';

  function log(message, isError = false) {
    logEl.textContent = message;
    logEl.classList.toggle('error', isError);
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  function openTransferDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('f-tools-pdf-transfer', 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains('transfers')) {
          db.createObjectStore('transfers', { keyPath: 'id' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function putTransfer(record) {
    const db = await openTransferDb();
    try {
      await new Promise((resolve, reject) => {
        const tx = db.transaction('transfers', 'readwrite');
        tx.objectStore('transfers').put(record);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
  }

  function makeTransferId() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  }

  async function storeForCompare(sourceFile, outputBlob, outputName) {
    const id = makeTransferId();
    await putTransfer({
      id,
      createdAt: Date.now(),
      files: [
        {
          name: sourceFile.name,
          type: sourceFile.type || 'application/pdf',
          blob: sourceFile.slice(0, sourceFile.size, sourceFile.type || 'application/pdf'),
        },
        {
          name: outputName,
          type: 'application/pdf',
          blob: outputBlob,
        },
      ],
    });
    return `pdf-compare.html?from=pdf-to-image.html&transfer=${encodeURIComponent(id)}`;
  }

  async function renderPageToImage(page, scale, imageFormat, jpegQuality) {
    const outputViewport = page.getViewport({ scale: 1 });
    const renderViewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { alpha: false });

    canvas.width = Math.ceil(renderViewport.width);
    canvas.height = Math.ceil(renderViewport.height);

    context.fillStyle = '#fff';
    context.fillRect(0, 0, canvas.width, canvas.height);

    await page.render({
      canvasContext: context,
      viewport: renderViewport,
      background: 'white',
    }).promise;

    if (page.pageNumber === 1) {
      previewCanvas.width = canvas.width;
      previewCanvas.height = canvas.height;
      previewContext.drawImage(canvas, 0, 0);
      preview.classList.add('has-content');
    }

    const mimeType = imageFormat === 'PNG' ? 'image/png' : 'image/jpeg';
    const dataUrl = imageFormat === 'PNG'
      ? canvas.toDataURL(mimeType)
      : canvas.toDataURL(mimeType, jpegQuality);

    return {
      dataUrl,
      width: outputViewport.width,
      height: outputViewport.height,
    };
  }

  async function convertPdfToImagePdf(file) {
    const arrayBuffer = await file.arrayBuffer();
    const sourcePdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
    const scale = Number(scaleInput.value) || 2;
    const imageFormat = formatInput.value;
    const jpegQuality = Number(qualityInput.value) || 0.95;
    const { jsPDF } = window.jspdf;
    let outputPdf = null;

    for (let pageNumber = 1; pageNumber <= sourcePdf.numPages; pageNumber += 1) {
      log(`正在处理第 ${pageNumber} / ${sourcePdf.numPages} 页...`);

      const page = await sourcePdf.getPage(pageNumber);
      const image = await renderPageToImage(page, scale, imageFormat, jpegQuality);
      const orientation = image.width > image.height ? 'landscape' : 'portrait';

      if (!outputPdf) {
        outputPdf = new jsPDF({
          unit: 'pt',
          format: [image.width, image.height],
          orientation,
          compress: true,
        });
      } else {
        outputPdf.addPage([image.width, image.height], orientation);
      }

      outputPdf.addImage(
        image.dataUrl,
        imageFormat,
        0,
        0,
        image.width,
        image.height,
        undefined,
        'FAST'
      );
    }

    try { await sourcePdf.destroy(); } catch (_) {}

    const blob = outputPdf.output('blob');
    const outputName = file.name.replace(/\.pdf$/i, '') + '-图片版.pdf';
    downloadBlob(blob, outputName);
    compareUrl = await storeForCompare(file, blob, outputName);
    compareBtn.hidden = false;
    log(`完成：已生成 ${outputName}\n可点击“去 PDF 对比”查看原始 PDF 与图片版 PDF。`);
  }

  convertBtn.addEventListener('click', async () => {
    const file = fileInput.files && fileInput.files[0];

    if (!file) {
      log('请先选择一个 PDF 文件。', true);
      return;
    }

    convertBtn.disabled = true;
    compareBtn.hidden = true;
    compareUrl = '';
    preview.classList.remove('has-content');

    try {
      await convertPdfToImagePdf(file);
    } catch (error) {
      console.error(error);
      log('转换失败：' + (error && error.message ? error.message : String(error)), true);
    } finally {
      convertBtn.disabled = false;
    }
  });

  compareBtn.addEventListener('click', () => {
    if (!compareUrl) return;
    window.location.href = compareUrl;
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files && fileInput.files[0];
    compareBtn.hidden = true;
    compareUrl = '';
    preview.classList.remove('has-content');
    log(file ? `已选择：${file.name}` : '等待选择 PDF...');
  });
})();
</script>
</body>
</html>
