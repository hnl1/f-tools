<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 转图片版</title>
<script src="../assets/theme-toggle.js"></script>
<script src="../assets/home-link.js"></script>
<script src="../assets/clear-button.js"></script>
<script src="../assets/tool-header.js"></script>
<style>
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #1e1e1e;
    --text: #ddd;
    --text-muted: #aaa;
    --text-faint: #888;
    --header-bg: #252525;
    --surface: #252525;
    --surface-soft: #1a1a1a;
    --border: #333;
    --button-bg: #3a3a3a;
    --button-border: #555;
    --button-hover: #4a4a4a;
    --accent: #4a9eff;
    --accent-strong: #2f7edb;
    --accent-tint: rgba(74, 158, 255, 0.08);
    --danger: #f87171;
    --preview-bg: #111;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #fafafa;
    --text: #1f2937;
    --text-muted: #4b5563;
    --text-faint: #6b7280;
    --header-bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #f3f4f6;
    --border: #e5e7eb;
    --button-bg: #ffffff;
    --button-border: #d1d5db;
    --button-hover: #f3f4f6;
    --accent: #2563eb;
    --accent-strong: #1d4ed8;
    --accent-tint: rgba(37, 99, 235, 0.06);
    --danger: #dc2626;
    --preview-bg: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  button,
  input,
  select {
    font: inherit;
  }
  .button {
    background: var(--button-bg);
    color: var(--text);
    border: 1px solid var(--button-border);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .button:not(:disabled):hover {
    background: var(--button-hover);
  }
  main {
    width: 100%;
    margin: 0;
    padding: 0;
  }
  body.tool-page .panel.upload-panel {
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
  }
  .panel {
    align-self: start;
  }
  .form {
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  label span {
    color: var(--text);
    font-weight: 500;
  }
  .toolbar {
    display: grid;
    grid-template-columns: minmax(160px, 220px) auto;
    align-items: end;
    gap: 12px;
  }
  .file-drop-zone {
    min-height: calc(100vh - 144px);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    text-align: center;
    font-size: 18px;
  }
  input[type="file"],
  input[type="number"],
  select {
    width: 100%;
    background: var(--button-bg);
    color: var(--text);
    border: 1px solid var(--button-border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .hint {
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.5;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
  }
  .toolbar .actions {
    margin: 0;
  }
  .button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .button.primary:not(:disabled):hover {
    background: var(--accent-strong);
  }
  .button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .button[hidden] {
    display: none;
  }
  .pdf-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .bulk-progress {
    position: fixed;
    top: 72px;
    left: 50%;
    z-index: 20;
    width: min(560px, calc(100vw - 48px));
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    transform: translateX(-50%);
  }
  .bulk-progress[hidden] {
    display: none;
  }
  .bulk-progress-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text);
    cursor: grab;
    user-select: none;
  }
  .bulk-progress.is-dragging .bulk-progress-head {
    cursor: grabbing;
  }
  .bulk-progress-title {
    font-weight: 600;
  }
  .bulk-progress-title-row {
    display: inline-flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px;
  }
  .bulk-progress-hint {
    color: var(--text-faint);
    font-size: 12px;
    font-weight: 400;
    line-height: 1.5;
  }
  .bulk-progress-hint[hidden] {
    display: none;
  }
  .bulk-progress-count {
    color: var(--text-muted);
    white-space: nowrap;
  }
  .bulk-progress-close {
    width: 24px;
    height: 24px;
    margin: 0;
    padding: 0;
    color: var(--text-muted);
    background: transparent;
    border: 0;
    box-shadow: none;
    font-size: 18px;
    line-height: 1;
  }
  .bulk-progress-close:not(:disabled):hover {
    color: var(--accent);
    background: var(--accent-tint);
    border-color: transparent;
  }
  .bulk-progress.is-opening {
    transform-origin: top center;
    animation: bulkProgressOpen 0.34s cubic-bezier(0.18, 0.9, 0.22, 1);
  }
  @keyframes bulkProgressOpen {
    0% {
      opacity: 0;
      clip-path: inset(0 45% 92% 45% round 999px);
      filter: blur(4px);
    }
    65% {
      opacity: 1;
      clip-path: inset(0 0 0 0 round 10px);
      filter: blur(0);
    }
    82% {
      clip-path: inset(0 1.5% 0 1.5% round 10px);
    }
    100% {
      opacity: 1;
      clip-path: inset(0 0 0 0 round 10px);
      filter: blur(0);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .bulk-progress.is-opening {
      animation: none;
    }
  }
  .bulk-progress-track {
    height: 8px;
    overflow: hidden;
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .bulk-progress-bar {
    width: 0%;
    height: 100%;
    background: var(--accent);
    transition: width 0.2s ease;
  }
  .bulk-progress-meta {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.5;
  }
  .pdf-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 20px;
    align-items: start;
  }
  .pdf-info {
    min-width: 0;
    padding: 4px 0;
  }
  .pdf-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow-wrap: anywhere;
    word-break: break-word;
    white-space: normal;
  }
  .pdf-status {
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .pdf-status[hidden] {
    display: none;
  }
  .pdf-status.error {
    color: var(--danger);
  }
  .pdf-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }
  #bulk-progress-header-summary {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
  }
  @media (max-width: 820px) {
    main {
      padding: 0;
    }
    .toolbar {
      grid-template-columns: 1fr;
    }
  }
</style>
<link rel="stylesheet" href="../assets/common.css">
</head>
<body class="tool-page">
<div id="header-controls" hidden>
  <button class="button primary" id="generate-all-btn" type="button" disabled>转换</button>
  <button class="button" id="download-all-btn" type="button" disabled>下载</button>
  <button class="button" id="add-pdf-btn" type="button">添加 PDF</button>
  <button class="button" id="bulk-progress-header-summary" type="button" hidden>已处理 0 / 0</button>
</div>

<main>
  <section class="panel upload-panel">
    <div class="form">
      <div id="drop-hint" class="file-drop-zone" role="button" tabindex="0" aria-labelledby="pdf-to-image-drop-title">
        <input id="pdf-file" class="visually-hidden-file" type="file" accept="application/pdf,.pdf" multiple aria-label="选择 PDF 文件">
        <div class="file-drop-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v12"></path>
            <path d="m7 9 5-5 5 5"></path>
            <path d="M5 18v2h14v-2"></path>
          </svg>
        </div>
        <div>
          <div id="pdf-to-image-drop-title" class="file-drop-title"></div>
        </div>
        <div id="pdf-to-image-drop-status" class="file-drop-status" hidden></div>
      </div>

      <div id="bulk-progress" class="bulk-progress" hidden>
        <div class="bulk-progress-head">
          <span class="bulk-progress-title-row">
            <span id="bulk-progress-title" class="bulk-progress-title">转换中</span>
            <span id="bulk-progress-hint" class="bulk-progress-hint" hidden>请尽量保持此页面在前台，否则浏览器可能降低处理速度。</span>
          </span>
          <span>
            <span id="bulk-progress-count" class="bulk-progress-count">0 / 0</span>
            <button id="bulk-progress-close" class="button bulk-progress-close" type="button" aria-label="关闭进度详情">×</button>
          </span>
        </div>
        <div class="bulk-progress-track" aria-hidden="true">
          <div id="bulk-progress-bar" class="bulk-progress-bar"></div>
        </div>
        <div id="bulk-progress-meta" class="bulk-progress-meta"></div>
      </div>

      <div id="pdf-list" class="pdf-list" aria-live="polite">
      </div>
    </div>
  </section>
</main>

<script src="../vendor/pdfjs/pdf.min.js"></script>
<script src="../vendor/jspdf/jspdf.umd.min.js"></script>
<script src="../assets/file-input.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = '../vendor/pdfjs/pdf.worker.min.js';

(() => {
  const headerControlsHost = document.getElementById('header-controls');
  const { clearBtn } = ToolHeader.mount({
    title: 'PDF 转图片版',
    controls: Array.from(headerControlsHost.children),
    clearButton: { onClear: () => clearAll() },
  });
  headerControlsHost.remove();

  const fileInput = document.getElementById('pdf-file');
  const dropHint = document.getElementById('drop-hint');
  const dropStatus = document.getElementById('pdf-to-image-drop-status');
  const addPdfBtn = document.getElementById('add-pdf-btn');
  const generateAllBtn = document.getElementById('generate-all-btn');
  const downloadAllBtn = document.getElementById('download-all-btn');
  const bulkProgressHeaderSummary = document.getElementById('bulk-progress-header-summary');
  const bulkProgress = document.getElementById('bulk-progress');
  const bulkProgressHead = bulkProgress.querySelector('.bulk-progress-head');
  const bulkProgressTitle = document.getElementById('bulk-progress-title');
  const bulkProgressCount = document.getElementById('bulk-progress-count');
  const bulkProgressBar = document.getElementById('bulk-progress-bar');
  const bulkProgressMeta = document.getElementById('bulk-progress-meta');
  const bulkProgressHint = document.getElementById('bulk-progress-hint');
  const bulkProgressClose = document.getElementById('bulk-progress-close');
  const pdfList = document.getElementById('pdf-list');
  const logEl = document.getElementById('log');
  const RENDER_SCALE = 2;
  const GENERATE_ALL_CONCURRENCY = 4;

  /** @type {{id:string, file:File, status:string, outputBlob:Blob|null, outputName:string, compareUrl:string, error:string, elements:any}[]} */
  let items = [];
  let nextItemId = 1;
  let isGenerating = false;
  let cancelRequested = false;
  let isBulkProgressDismissed = false;
  let bulkProgressDrag = null;
  let dropZone = null;

  function log(message, isError = false) {
    if (!logEl) return;
    logEl.textContent = message;
    logEl.classList.toggle('error', isError);
  }

  function isPdfFile(file) {
    return Boolean(file) && (
      file.type === 'application/pdf' ||
      /\.pdf$/i.test(file.name || '')
    );
  }

  function makeOutputName(fileName) {
    const baseName = (fileName || 'converted').replace(/\.pdf$/i, '');
    return `${baseName}-images.pdf`;
  }

  function updateGlobalControls() {
    const hasItems = items.length > 0;
    const hasGenerated = items.some((item) => item.outputBlob);
    updateHeaderProgressSummary();
    if (dropZone) dropZone.setHasItems(hasItems);
    generateAllBtn.textContent = isGenerating ? '停止' : '转换';
    generateAllBtn.classList.toggle('danger', isGenerating);
    generateAllBtn.classList.toggle('primary', !isGenerating);
    generateAllBtn.disabled = isGenerating ? cancelRequested : !hasItems;
    downloadAllBtn.disabled = !hasGenerated || isGenerating;
    pdfList.hidden = !hasItems;
    clearBtn.setEnabled(hasItems && !isGenerating);
  }

  function getProcessedItemCount() {
    return items.filter((item) => item.outputBlob || item.status === 'error').length;
  }

  function getFailedItemCount() {
    return items.filter((item) => item.status === 'error').length;
  }

  function updateHeaderProgressSummary() {
    const total = items.length;
    const completed = getProcessedItemCount();
    bulkProgressHeaderSummary.hidden = total === 0;
    bulkProgressHeaderSummary.textContent = `已处理 ${completed} / ${total}`;
  }

  function requestStopGenerating() {
    if (!isGenerating || cancelRequested) return;
    cancelRequested = true;
    updateGlobalControls();
    log('正在停止转换，当前页处理完后会停止。');
  }

  function hideBulkProgress() {
    bulkProgressTitle.textContent = '转换中';
    bulkProgressCount.textContent = '0 / 0';
    bulkProgressBar.style.width = '0%';
    bulkProgressMeta.textContent = '';
    bulkProgressHint.hidden = true;
    bulkProgressHeaderSummary.textContent = '已处理 0 / 0';
    bulkProgressHeaderSummary.hidden = true;
    isBulkProgressDismissed = false;
    bulkProgress.hidden = true;
  }

  function closeBulkProgress() {
    isBulkProgressDismissed = true;
    bulkProgress.hidden = true;
  }

  function showBulkProgress(animate = true) {
    if (!items.length) return;
    isBulkProgressDismissed = false;
    if (!isGenerating) updateIdleBulkProgress();
    bulkProgress.hidden = false;
    if (!animate) return;
    bulkProgress.classList.remove('is-opening');
    void bulkProgress.offsetWidth;
    bulkProgress.classList.add('is-opening');
  }

  function updateIdleBulkProgress() {
    const total = items.length;
    const completed = getProcessedItemCount();
    const failed = getFailedItemCount();
    const percent = total ? Math.round((completed / total) * 100) : 0;
    bulkProgressTitle.textContent = '处理进度';
    bulkProgressCount.textContent = `${completed} / ${total}`;
    bulkProgressBar.style.width = `${percent}%`;
    bulkProgressHint.hidden = true;
    bulkProgressMeta.textContent = failed
      ? `已完成 ${completed} 个，失败 ${failed} 个`
      : `已完成 ${completed} 个`;
  }

  function clampBulkProgressPosition(left, top) {
    const rect = bulkProgress.getBoundingClientRect();
    return {
      left: Math.min(Math.max(8, left), Math.max(8, window.innerWidth - rect.width - 8)),
      top: Math.min(Math.max(56, top), Math.max(56, window.innerHeight - rect.height - 8)),
    };
  }

  function startBulkProgressDrag(event) {
    if (event.target.closest('button')) return;
    const rect = bulkProgress.getBoundingClientRect();
    bulkProgressDrag = {
      pointerId: event.pointerId,
      offsetX: event.clientX - rect.left,
      offsetY: event.clientY - rect.top,
    };
    bulkProgress.style.left = `${rect.left}px`;
    bulkProgress.style.top = `${rect.top}px`;
    bulkProgress.style.right = 'auto';
    bulkProgress.style.bottom = 'auto';
    bulkProgress.style.transform = 'none';
    bulkProgress.classList.add('is-dragging');
    bulkProgressHead.setPointerCapture(event.pointerId);
  }

  function moveBulkProgress(event) {
    if (!bulkProgressDrag || event.pointerId !== bulkProgressDrag.pointerId) return;
    const next = clampBulkProgressPosition(
      event.clientX - bulkProgressDrag.offsetX,
      event.clientY - bulkProgressDrag.offsetY
    );
    bulkProgress.style.left = `${next.left}px`;
    bulkProgress.style.top = `${next.top}px`;
  }

  function stopBulkProgressDrag(event) {
    if (!bulkProgressDrag || event.pointerId !== bulkProgressDrag.pointerId) return;
    bulkProgress.classList.remove('is-dragging');
    bulkProgressDrag = null;
  }

  function formatDuration(milliseconds) {
    const totalSeconds = Math.max(0, Math.round(milliseconds / 1000));
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    if (!minutes) return `${seconds}s`;
    const hours = Math.floor(minutes / 60);
    const remainingMinutes = minutes % 60;
    if (!hours) return `${minutes}m ${seconds}s`;
    return `${hours}h ${remainingMinutes}m ${seconds}s`;
  }

  function updateBulkProgress(state) {
    const total = state.total || 0;
    const completed = state.completed || 0;
    const failed = state.failed || 0;
    const elapsed = state.startedAt ? Date.now() - state.startedAt : 0;
    const speed = elapsed > 0 ? completed / (elapsed / 1000) : 0;
    const remaining = speed > 0 && completed < total ? (total - completed) / speed * 1000 : 0;
    const percent = total ? Math.round((completed / total) * 100) : 0;
    updateHeaderProgressSummary();
    if (!isBulkProgressDismissed) bulkProgress.hidden = false;
    bulkProgressTitle.textContent = state.title || '转换中';
    bulkProgressCount.textContent = `${completed} / ${total}`;
    bulkProgressBar.style.width = `${percent}%`;
    bulkProgressHint.hidden = state.title !== '转换中';
    const completedText = failed
      ? `已完成 ${completed} 个，失败 ${failed} 个`
      : `已完成 ${completed} 个`;
    const speedText = speed > 0 ? `${speed.toFixed(2)} 个/秒` : '计算中';
    const parts = [
      completedText,
      `耗时 ${formatDuration(elapsed)}`,
      `平均 ${speedText}`,
    ];
    if (completed < total) {
      parts.splice(2, 0, `预计还需 ${formatDuration(remaining)}`);
    }
    bulkProgressMeta.textContent = parts.join('，');
  }

  function clearAll() {
    if (isGenerating || !items.length) return;
    items.forEach((item) => item.elements.row.remove());
    items = [];
    hideBulkProgress();
    log('已清空全部 PDF。');
    updateGlobalControls();
  }

  function setItemStatus(item, status, message, isError = false) {
    item.status = status;
    item.error = isError ? message : '';
    item.elements.status.textContent = message;
    item.elements.status.hidden = !message;
    item.elements.status.classList.toggle('error', isError);
    item.elements.generateBtn.disabled = isGenerating || status === 'generating';
    item.elements.deleteBtn.disabled = isGenerating;
    item.elements.downloadBtn.hidden = !item.outputBlob;
    item.elements.downloadBtn.disabled = !item.outputBlob;
    item.elements.compareBtn.hidden = !item.compareUrl;
    item.elements.compareBtn.disabled = !item.compareUrl;
    updateGlobalControls();
  }

  function getDisplayPathSeparator() {
    return /Win/i.test(navigator.platform || navigator.userAgent || '') ? '\\' : '/';
  }

  function getPdfDisplayName(file, fileEntry) {
    const relativePath = fileEntry && fileEntry.relativePath;
    if (!relativePath || relativePath === file.name) return file.name || '未命名 PDF';
    return relativePath.split('/').filter(Boolean).join(getDisplayPathSeparator());
  }

  function getPdfOutputPath(file, fileEntry, outputName) {
    const relativePath = fileEntry && fileEntry.relativePath;
    if (!relativePath || relativePath === file.name) return outputName;
    const parts = relativePath.split('/').filter(Boolean);
    parts[parts.length - 1] = outputName;
    return parts.join('/');
  }

  function addPdfFiles(files, sourceLabel, fileEntries = []) {
    const entryByFile = new Map(fileEntries.map((entry) => [entry.file, entry]));
    const pdfFiles = Array.from(files || []).filter(isPdfFile);
    if (!pdfFiles.length) {
      log(`${sourceLabel}的文件不是 PDF，请使用 .pdf 文件。`, true);
      return;
    }

    pdfFiles.forEach((file) => addPdfItem(file, entryByFile.get(file)));
    log(`已${sourceLabel} ${pdfFiles.length} 个 PDF，可单独转换或点击“转换”。`);
    updateGlobalControls();
  }

  function addPdfItem(file, fileEntry) {
    const displayName = getPdfDisplayName(file, fileEntry);
    const outputName = makeOutputName(file.name);
    const item = {
      id: `pdf-item-${nextItemId++}`,
      file,
      fileEntry,
      displayName,
      status: 'pending',
      outputBlob: null,
      outputName,
      outputPath: getPdfOutputPath(file, fileEntry, outputName),
      compareUrl: '',
      error: '',
      elements: {},
    };

    const row = document.createElement('div');
    row.className = 'pdf-item';
    row.dataset.itemId = item.id;

    const info = document.createElement('div');
    info.className = 'pdf-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'pdf-name';
    nameEl.textContent = displayName;
    nameEl.title = nameEl.textContent;

    const statusEl = document.createElement('div');
    statusEl.className = 'pdf-status';
    statusEl.hidden = true;

    info.appendChild(nameEl);
    info.appendChild(statusEl);

    const actions = document.createElement('div');
    actions.className = 'pdf-actions';

    const generateBtn = document.createElement('button');
    generateBtn.className = 'button primary';
    generateBtn.type = 'button';
    generateBtn.textContent = '转换';

    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'button';
    downloadBtn.type = 'button';
    downloadBtn.textContent = '下载';
    downloadBtn.hidden = true;

    const compareBtn = document.createElement('button');
    compareBtn.className = 'button';
    compareBtn.type = 'button';
    compareBtn.textContent = '比较';
    compareBtn.hidden = true;

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'button icon-action-btn trash delete-item-btn';
    deleteBtn.type = 'button';
    deleteBtn.title = `删除 ${displayName}`;
    deleteBtn.setAttribute('aria-label', deleteBtn.title);

    actions.appendChild(generateBtn);
    actions.appendChild(downloadBtn);
    actions.appendChild(compareBtn);
    actions.appendChild(deleteBtn);
    row.appendChild(info);
    row.appendChild(actions);
    pdfList.appendChild(row);

    item.elements = { row, status: statusEl, generateBtn, downloadBtn, compareBtn, deleteBtn };
    items.push(item);

    generateBtn.addEventListener('click', () => generateOne(item));
    downloadBtn.addEventListener('click', () => {
      if (item.outputBlob) downloadBlob(item.outputBlob, item.outputName);
    });
    compareBtn.addEventListener('click', () => {
      if (item.compareUrl) window.open(item.compareUrl, '_blank', 'noopener');
    });
    deleteBtn.addEventListener('click', () => removePdfItem(item));
  }

  function removePdfItem(item) {
    if (!item || isGenerating) return;
    items = items.filter((entry) => entry !== item);
    item.elements.row.remove();
    log(`已删除：${item.displayName || item.file.name || '未命名 PDF'}`);
    updateGlobalControls();
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  const ZIP_MAX_32BIT_SIZE = 0xffffffff;
  let crc32Table = null;

  function getCrc32Table() {
    if (crc32Table) return crc32Table;
    crc32Table = new Uint32Array(256);
    for (let index = 0; index < 256; index += 1) {
      let value = index;
      for (let bit = 0; bit < 8; bit += 1) {
        value = (value & 1) ? (0xedb88320 ^ (value >>> 1)) : (value >>> 1);
      }
      crc32Table[index] = value >>> 0;
    }
    return crc32Table;
  }

  function calculateCrc32(buffer) {
    const table = getCrc32Table();
    const bytes = new Uint8Array(buffer);
    let crc = 0xffffffff;
    for (let index = 0; index < bytes.length; index += 1) {
      crc = table[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  function getZipDateTime(date = new Date()) {
    const year = Math.max(1980, date.getFullYear());
    return {
      time: (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2),
      date: ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate(),
    };
  }

  function normalizeZipPath(value, fallbackName) {
    const path = String(value || fallbackName || 'converted.pdf')
      .replace(/\\/g, '/')
      .split('/')
      .filter((part) => part && part !== '.' && part !== '..')
      .join('/');
    return path || fallbackName || 'converted.pdf';
  }

  function makeUniqueZipPaths(entries) {
    const seen = new Map();
    return entries.map((entry) => {
      const normalizedPath = normalizeZipPath(entry.path, entry.name);
      const count = seen.get(normalizedPath) || 0;
      seen.set(normalizedPath, count + 1);
      if (!count) return Object.assign({}, entry, { path: normalizedPath });

      const slashIndex = normalizedPath.lastIndexOf('/');
      const directory = slashIndex >= 0 ? normalizedPath.slice(0, slashIndex + 1) : '';
      const fileName = slashIndex >= 0 ? normalizedPath.slice(slashIndex + 1) : normalizedPath;
      const dotIndex = fileName.lastIndexOf('.');
      const baseName = dotIndex > 0 ? fileName.slice(0, dotIndex) : fileName;
      const extension = dotIndex > 0 ? fileName.slice(dotIndex) : '';
      return Object.assign({}, entry, {
        path: `${directory}${baseName} (${count + 1})${extension}`,
      });
    });
  }

  function createLocalFileHeader(nameBytes, crc32, size, zipTime, zipDate) {
    const header = new Uint8Array(30 + nameBytes.length);
    const view = new DataView(header.buffer);
    view.setUint32(0, 0x04034b50, true);
    view.setUint16(4, 20, true);
    view.setUint16(6, 0x0800, true);
    view.setUint16(8, 0, true);
    view.setUint16(10, zipTime, true);
    view.setUint16(12, zipDate, true);
    view.setUint32(14, crc32, true);
    view.setUint32(18, size, true);
    view.setUint32(22, size, true);
    view.setUint16(26, nameBytes.length, true);
    view.setUint16(28, 0, true);
    header.set(nameBytes, 30);
    return header;
  }

  function createCentralDirectoryHeader(nameBytes, crc32, size, offset, zipTime, zipDate) {
    const header = new Uint8Array(46 + nameBytes.length);
    const view = new DataView(header.buffer);
    view.setUint32(0, 0x02014b50, true);
    view.setUint16(4, 20, true);
    view.setUint16(6, 20, true);
    view.setUint16(8, 0x0800, true);
    view.setUint16(10, 0, true);
    view.setUint16(12, zipTime, true);
    view.setUint16(14, zipDate, true);
    view.setUint32(16, crc32, true);
    view.setUint32(20, size, true);
    view.setUint32(24, size, true);
    view.setUint16(28, nameBytes.length, true);
    view.setUint16(30, 0, true);
    view.setUint16(32, 0, true);
    view.setUint16(34, 0, true);
    view.setUint16(36, 0, true);
    view.setUint32(38, 0, true);
    view.setUint32(42, offset, true);
    header.set(nameBytes, 46);
    return header;
  }

  async function createZipBlob(entries) {
    const encoder = new TextEncoder();
    const localParts = [];
    const centralParts = [];
    const zipEntries = makeUniqueZipPaths(entries);
    let offset = 0;

    for (const entry of zipEntries) {
      const blob = entry.blob;
      if (blob.size > ZIP_MAX_32BIT_SIZE || offset > ZIP_MAX_32BIT_SIZE) {
        throw new Error('ZIP 文件过大，浏览器端暂不支持超过 4GB 的打包。');
      }

      const nameBytes = encoder.encode(entry.path);
      const { time, date } = getZipDateTime();
      const crc32 = calculateCrc32(await blob.arrayBuffer());
      const localHeader = createLocalFileHeader(nameBytes, crc32, blob.size, time, date);
      const centralHeader = createCentralDirectoryHeader(nameBytes, crc32, blob.size, offset, time, date);

      localParts.push(localHeader, blob);
      centralParts.push(centralHeader);
      offset += localHeader.byteLength + blob.size;
    }

    const centralDirectorySize = centralParts.reduce((total, part) => total + part.byteLength, 0);
    const end = new Uint8Array(22);
    const view = new DataView(end.buffer);
    view.setUint32(0, 0x06054b50, true);
    view.setUint16(8, zipEntries.length, true);
    view.setUint16(10, zipEntries.length, true);
    view.setUint32(12, centralDirectorySize, true);
    view.setUint32(16, offset, true);
    view.setUint16(20, 0, true);

    return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
  }

  function openTransferDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('f-tools-pdf-transfer', 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains('transfers')) {
          db.createObjectStore('transfers', { keyPath: 'id' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function putTransfer(record) {
    const db = await openTransferDb();
    try {
      await new Promise((resolve, reject) => {
        const tx = db.transaction('transfers', 'readwrite');
        tx.objectStore('transfers').put(record);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
  }

  function makeTransferId() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  }

  async function storeForCompare(sourceFile, outputBlob, outputName) {
    const id = makeTransferId();
    await putTransfer({
      id,
      createdAt: Date.now(),
      files: [
        {
          name: sourceFile.name,
          type: sourceFile.type || 'application/pdf',
          blob: sourceFile.slice(0, sourceFile.size, sourceFile.type || 'application/pdf'),
        },
        {
          name: outputName,
          type: 'application/pdf',
          blob: outputBlob,
        },
      ],
    });
    return `pdf-compare.html?from=pdf-to-image.html&transfer=${encodeURIComponent(id)}`;
  }

  async function renderPageToImage(page, scale) {
    const outputViewport = page.getViewport({ scale: 1 });
    const renderViewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { alpha: false });

    canvas.width = Math.ceil(renderViewport.width);
    canvas.height = Math.ceil(renderViewport.height);

    context.fillStyle = '#fff';
    context.fillRect(0, 0, canvas.width, canvas.height);

    await page.render({
      canvasContext: context,
      viewport: renderViewport,
      background: 'white',
    }).promise;

    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

    return {
      dataUrl,
      width: outputViewport.width,
      height: outputViewport.height,
    };
  }

  function createAbortError() {
    const error = new Error('已停止转换。');
    error.name = 'AbortError';
    return error;
  }

  function isAbortError(error) {
    return error && error.name === 'AbortError';
  }

  function throwIfCancelled(shouldCancel) {
    if (typeof shouldCancel === 'function' && shouldCancel()) throw createAbortError();
  }

  async function convertPdfToImagePdf(file, onProgress, shouldCancel) {
    throwIfCancelled(shouldCancel);
    const arrayBuffer = await file.arrayBuffer();
    throwIfCancelled(shouldCancel);
    const sourcePdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
    const { jsPDF } = window.jspdf;
    let outputPdf = null;

    try {
      for (let pageNumber = 1; pageNumber <= sourcePdf.numPages; pageNumber += 1) {
        throwIfCancelled(shouldCancel);
        onProgress(pageNumber, sourcePdf.numPages);

        const page = await sourcePdf.getPage(pageNumber);
        throwIfCancelled(shouldCancel);
        const image = await renderPageToImage(page, RENDER_SCALE);
        throwIfCancelled(shouldCancel);
        const orientation = image.width > image.height ? 'landscape' : 'portrait';

        if (!outputPdf) {
          outputPdf = new jsPDF({
            unit: 'pt',
            format: [image.width, image.height],
            orientation,
            compress: true,
          });
        } else {
          outputPdf.addPage([image.width, image.height], orientation);
        }

        outputPdf.addImage(
          image.dataUrl,
          'JPEG',
          0,
          0,
          image.width,
          image.height,
          undefined,
          'FAST'
        );
      }

      throwIfCancelled(shouldCancel);
      return outputPdf.output('blob');
    } finally {
      try { await sourcePdf.destroy(); } catch (_) {}
    }
  }

  async function saveGeneratedResultForCompare(item, blob) {
    item.outputBlob = blob;
    item.outputName = makeOutputName(item.file.name);
    item.outputPath = getPdfOutputPath(item.file, item.fileEntry, item.outputName);
    item.compareUrl = '';

    try {
      item.compareUrl = await storeForCompare(item.file, blob, item.outputName);
      return true;
    } catch (error) {
      console.warn('prepare compare transfer failed', error);
      return false;
    }
  }

  async function generateOne(item) {
    if (!item || isGenerating) return;

    cancelRequested = false;
    isGenerating = true;
    setAllItemButtonsDisabled(true);
    updateGlobalControls();
    item.outputBlob = null;
    item.compareUrl = '';
    setItemStatus(item, 'generating', '转换中...');
    log(`正在转换：${item.file.name}`);

    try {
      const blob = await convertPdfToImagePdf(item.file, (pageNumber, pageCount) => {
        const message = `转换中：第 ${pageNumber} / ${pageCount} 页`;
        item.elements.status.textContent = message;
        log(`${item.file.name}\n${message}`);
      }, () => cancelRequested);
      const canCompare = await saveGeneratedResultForCompare(item, blob);
      setItemStatus(
        item,
        'generated',
        canCompare
          ? `已转换：${item.outputName}`
          : `已转换：${item.outputName}（比较准备失败，可下载后拖入对比页）`
      );
      log(canCompare
        ? `完成：${item.outputName}\n不会自动下载，可点击“下载”或“比较”。`
        : `完成：${item.outputName}\n不会自动下载；比较入口准备失败，可下载后拖入 PDF 对比页。`);
    } catch (error) {
      if (isAbortError(error)) {
        setItemStatus(item, 'pending', '已停止');
        log('已停止转换。');
      } else {
        console.error(error);
        setItemStatus(item, 'error', '转换失败：' + (error && error.message ? error.message : String(error)), true);
        log(`${item.file.name} 转换失败：` + (error && error.message ? error.message : String(error)), true);
      }
    } finally {
      isGenerating = false;
      cancelRequested = false;
      setAllItemButtonsDisabled(false);
      updateGlobalControls();
    }
  }

  async function generateAll() {
    if (isGenerating || !items.length) return;
    const pendingItems = items.filter((item) => !item.outputBlob);
    if (!pendingItems.length) {
      log('所有 PDF 都已转换，可点击“下载”或单项下载。');
      return;
    }

    isGenerating = true;
    setAllItemButtonsDisabled(true);
    updateGlobalControls();
    const concurrency = Math.min(GENERATE_ALL_CONCURRENCY, pendingItems.length);
    let nextIndex = 0;
    let completedCount = 0;
    let activeCount = 0;
    let failedCount = 0;
    const startedAt = Date.now();
    isBulkProgressDismissed = false;
    log(`开始转换，共 ${pendingItems.length} 个未转换 PDF，并发 ${concurrency}。`);
    updateBulkProgress({
      title: '转换中',
      total: pendingItems.length,
      completed: completedCount,
      active: activeCount,
      failed: failedCount,
      startedAt,
    });

    async function runNext() {
      while (!cancelRequested && nextIndex < pendingItems.length) {
        const index = nextIndex++;
        const item = pendingItems[index];
        let wasAborted = false;
        item.outputBlob = null;
        item.compareUrl = '';
        activeCount += 1;
        setItemStatus(item, 'generating', `转换中...（队列 ${index + 1} / ${pendingItems.length}）`);
        log(`正在转换 ${index + 1} / ${pendingItems.length}：${item.file.name}`);
        updateBulkProgress({
          title: '转换中',
          total: pendingItems.length,
          completed: completedCount,
          active: activeCount,
          failed: failedCount,
          startedAt,
        });

        try {
          const blob = await convertPdfToImagePdf(item.file, (pageNumber, pageCount) => {
            const message = `转换中：第 ${pageNumber} / ${pageCount} 页`;
            item.elements.status.textContent = `${message}（队列 ${index + 1} / ${pendingItems.length}）`;
            log(`${item.file.name}\n${message}\n队列：${index + 1} / ${pendingItems.length}`);
          }, () => cancelRequested);
          const canCompare = await saveGeneratedResultForCompare(item, blob);
          setItemStatus(
            item,
            'generated',
            canCompare
              ? `已转换：${item.outputName}`
              : `已转换：${item.outputName}（比较准备失败，可下载后拖入对比页）`
          );
        } catch (error) {
          if (isAbortError(error)) {
            wasAborted = true;
            setItemStatus(item, 'pending', '已停止');
          } else {
            console.error(error);
            failedCount += 1;
            setItemStatus(item, 'error', '转换失败：' + (error && error.message ? error.message : String(error)), true);
          }
        } finally {
          activeCount -= 1;
          if (!wasAborted) completedCount += 1;
          updateBulkProgress({
            title: '转换中',
            total: pendingItems.length,
            completed: completedCount,
            active: activeCount,
            failed: failedCount,
            startedAt,
          });
          log(`已完成 ${completedCount} / ${pendingItems.length} 个未转换 PDF。`);
        }
      }
    }

    try {
      await Promise.all(Array.from({ length: concurrency }, runNext));
      updateBulkProgress({
        title: cancelRequested ? '已停止' : (failedCount ? '转换完成（有失败）' : '转换完成'),
        total: pendingItems.length,
        completed: completedCount,
        active: 0,
        failed: failedCount,
        startedAt,
      });
      log(cancelRequested ? '已停止转换，未完成的 PDF 可稍后继续转换。' : '转换完成。不会自动下载，可点击“下载”或单项下载。');
    } finally {
      isGenerating = false;
      cancelRequested = false;
      setAllItemButtonsDisabled(false);
      updateGlobalControls();
    }
  }

  function setAllItemButtonsDisabled(disabled) {
    items.forEach((item) => {
      item.elements.generateBtn.disabled = disabled || item.status === 'generating';
      item.elements.downloadBtn.disabled = !item.outputBlob;
      item.elements.compareBtn.disabled = !item.compareUrl;
      item.elements.deleteBtn.disabled = disabled;
    });
  }

  async function downloadAllGenerated() {
    if (isGenerating) return;
    const generatedItems = items.filter((item) => item.outputBlob);
    if (!generatedItems.length) return;

    if (generatedItems.length === 1) {
      const item = generatedItems[0];
      downloadBlob(item.outputBlob, item.outputName);
      log(`已触发下载：${item.outputName}`);
      return;
    }

    downloadAllBtn.disabled = true;
    log(`正在打包 ${generatedItems.length} 个 PDF...`);
    try {
      const zipBlob = await createZipBlob(generatedItems.map((item) => ({
        path: item.outputPath || item.outputName,
        name: item.outputName,
        blob: item.outputBlob,
      })));
      downloadBlob(zipBlob, 'pdf-to-image-results.zip');
      log(`已打包 ${generatedItems.length} 个 PDF，并保留目录结构。`);
    } catch (error) {
      console.error(error);
      log(error && error.message ? error.message : '打包下载失败。', true);
    } finally {
      updateGlobalControls();
    }
  }

  generateAllBtn.addEventListener('click', () => {
    if (isGenerating) {
      requestStopGenerating();
      return;
    }
    generateAll();
  });
  bulkProgressClose.addEventListener('click', closeBulkProgress);
  bulkProgressHeaderSummary.addEventListener('click', showBulkProgress);
  bulkProgressHead.addEventListener('pointerdown', startBulkProgressDrag);
  bulkProgressHead.addEventListener('pointermove', moveBulkProgress);
  bulkProgressHead.addEventListener('pointerup', stopBulkProgressDrag);
  bulkProgressHead.addEventListener('pointercancel', stopBulkProgressDrag);
  downloadAllBtn.addEventListener('click', downloadAllGenerated);

  dropZone = FileInputDropZone.bind({
    zone: '#drop-hint',
    input: fileInput,
    triggerElement: dropHint,
    triggerButton: addPdfBtn,
    status: dropStatus,
    subject: 'PDF',
    multiple: true,
    onFiles(files, detail) {
      addPdfFiles(files, detail.sourceLabel, detail.fileEntries);
    },
  });

  updateGlobalControls();
})();
</script>
</body>
