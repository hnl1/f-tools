<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 转图片版</title>
<script src="../assets/theme-toggle.js"></script>
<script src="../assets/home-link.js"></script>
<script src="../assets/clear-button.js"></script>
<script src="../assets/tool-header.js"></script>
<style>
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #1e1e1e;
    --text: #ddd;
    --text-muted: #aaa;
    --text-faint: #888;
    --header-bg: #252525;
    --surface: #252525;
    --surface-soft: #1a1a1a;
    --border: #333;
    --button-bg: #3a3a3a;
    --button-border: #555;
    --button-hover: #4a4a4a;
    --accent: #4a9eff;
    --accent-strong: #2f7edb;
    --accent-tint: rgba(74, 158, 255, 0.08);
    --danger: #f87171;
    --preview-bg: #111;
    --status-pending-bg: rgba(245, 158, 11, 0.18);
    --status-pending-text: #fbbf24;
    --status-converting-bg: rgba(74, 158, 255, 0.18);
    --status-converting-text: #93c5fd;
    --status-done-bg: rgba(16, 185, 129, 0.18);
    --status-done-text: #34d399;
    --status-error-bg: rgba(248, 113, 113, 0.18);
    --status-error-text: #fca5a5;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #fafafa;
    --text: #1f2937;
    --text-muted: #4b5563;
    --text-faint: #6b7280;
    --header-bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #f3f4f6;
    --border: #e5e7eb;
    --button-bg: #ffffff;
    --button-border: #d1d5db;
    --button-hover: #f3f4f6;
    --accent: #2563eb;
    --accent-strong: #1d4ed8;
    --accent-tint: rgba(37, 99, 235, 0.06);
    --danger: #dc2626;
    --preview-bg: #e5e7eb;
    --status-pending-bg: #fef3c7;
    --status-pending-text: #b45309;
    --status-converting-bg: #dbeafe;
    --status-converting-text: #1d4ed8;
    --status-done-bg: #d1fae5;
    --status-done-text: #047857;
    --status-error-bg: #fee2e2;
    --status-error-text: #b91c1c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  button,
  input,
  select {
    font: inherit;
  }
  .button {
    background: var(--button-bg);
    color: var(--text);
    border: 1px solid var(--button-border);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .button:not(:disabled):hover {
    background: var(--button-hover);
  }
  main {
    width: 100%;
    margin: 0;
    padding: 0;
  }
  body.tool-page .panel.upload-panel {
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
  }
  .panel {
    align-self: start;
  }
  .form {
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  label span {
    color: var(--text);
    font-weight: 500;
  }
  .toolbar {
    display: grid;
    grid-template-columns: minmax(160px, 220px) auto;
    align-items: end;
    gap: 12px;
  }
  .file-drop-zone {
    min-height: calc(100vh - 144px);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    text-align: center;
    font-size: 18px;
  }
  input[type="file"],
  input[type="number"],
  select {
    width: 100%;
    background: var(--button-bg);
    color: var(--text);
    border: 1px solid var(--button-border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .hint {
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.5;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
  }
  .toolbar .actions {
    margin: 0;
  }
  .button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .button.primary:not(:disabled):hover {
    background: var(--accent-strong);
  }
  .button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .button[hidden] {
    display: none;
  }
  .pdf-list {
    display: flex;
    flex-direction: column;
  }
  .pdf-item + .pdf-item {
    border-top: 1px solid var(--border);
  }
  body.tool-page main:has(.upload-panel) {
    flex-direction: column;
  }
  body.tool-page .tool-header .bulk-progress {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 0;
    font-size: 12px;
    color: var(--text);
  }
  body.tool-page .tool-header .bulk-progress[hidden] {
    display: none;
  }
  .bulk-progress-sep {
    flex: 0 0 auto;
  }
  .bulk-progress-sep[hidden] {
    display: none;
  }
  .bulk-progress.is-done .bulk-progress-count,
  .bulk-progress.is-done .bulk-progress-track,
  .bulk-progress.is-done .bulk-progress-stat,
  .bulk-progress.is-done .bulk-progress-sep:not(#bulk-progress-meta-sep) {
    display: none;
  }
  .bulk-progress-count {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex: 0 0 auto;
    text-align: right;
    min-width: 4em;
  }
  .bulk-progress-track {
    flex: 0 0 140px;
    height: 6px;
    overflow: hidden;
    background: var(--button-bg);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  .bulk-progress-bar {
    width: 0%;
    height: 100%;
    background: var(--accent);
    transition: width 0.2s ease;
  }
  .bulk-progress-stat {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex: 0 0 auto;
    text-align: center;
  }
  .bulk-progress-percent {
    min-width: 2.6em;
  }
  .bulk-progress-time {
    min-width: 4.2em;
  }
  .bulk-progress-speed {
    min-width: 5.2em;
  }
  .bulk-progress-meta {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 0 1 auto;
    min-width: 0;
  }
  .bulk-progress-meta:empty {
    display: none;
  }
  .foreground-hint {
    margin: 8px 16px 0;
    padding: 8px 12px;
    background: var(--accent-tint);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .foreground-hint[hidden] {
    display: none;
  }
  .foreground-hint .hint-icon {
    flex: 0 0 auto;
  }
  .pdf-item {
    display: grid;
    grid-template-columns: auto minmax(160px, 1fr) auto minmax(180px, 220px) minmax(110px, 140px) auto;
    gap: 16px;
    align-items: center;
    padding: 8px 0;
  }
  .pdf-thumb {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 11px;
    width: 56px;
    height: 56px;
  }
  .pdf-thumb img {
    max-width: 56px;
    max-height: 56px;
    border-radius: 4px;
    display: block;
  }
  .pdf-thumb.is-clickable {
    cursor: zoom-in;
  }
  .pdf-thumb.is-clickable:hover img {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .pdf-info {
    min-width: 0;
  }
  .pdf-name {
    font-size: 14px;
    color: var(--text);
    overflow-wrap: anywhere;
    word-break: break-word;
    white-space: normal;
  }
  .pdf-meta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .pdf-status {
    justify-self: center;
    padding: 4px 14px;
    border-radius: 999px;
    font-size: 13px;
    line-height: 1.4;
    white-space: nowrap;
    background: var(--status-pending-bg);
    color: var(--status-pending-text);
  }
  .pdf-status.is-converting {
    background: var(--status-converting-bg);
    color: var(--status-converting-text);
  }
  .pdf-status.is-done {
    background: var(--status-done-bg);
    color: var(--status-done-text);
  }
  .pdf-status.is-error {
    background: var(--status-error-bg);
    color: var(--status-error-text);
  }
  .pdf-progress {
    min-width: 0;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .pdf-progress-label {
    color: var(--text-muted);
  }
  .pdf-progress-row {
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pdf-progress-bar {
    flex: 1 1 auto;
    height: 6px;
    background: var(--button-bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .pdf-progress-bar-fill {
    width: 0%;
    height: 100%;
    background: var(--accent);
    transition: width 0.2s ease;
  }
  .pdf-progress-percent {
    flex: 0 0 auto;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .pdf-progress-line {
    color: var(--text-muted);
  }
  .pdf-progress-line.is-primary {
    color: var(--text);
  }
  .pdf-progress-line + .pdf-progress-line {
    margin-top: 4px;
  }
  .pdf-progress.is-error {
    color: var(--danger);
  }
  .pdf-speed {
    min-width: 0;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
    font-variant-numeric: tabular-nums;
  }
  .pdf-speed-line + .pdf-speed-line {
    margin-top: 4px;
  }
  .pdf-speed-line.is-primary {
    color: var(--text);
  }
  .pdf-actions {
    display: flex;
    flex-wrap: nowrap;
    justify-content: flex-end;
    gap: 8px;
  }
  .button .button-icon {
    width: 14px;
    height: 14px;
    flex: 0 0 auto;
  }
  .button.accent {
    color: var(--accent);
  }
  .button.accent:not(:disabled):hover {
    color: var(--accent-strong);
    background: var(--accent-tint);
  }
  @media (max-width: 1200px) {
    .pdf-item {
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
    }
    .pdf-status,
    .pdf-progress,
    .pdf-speed {
      grid-column: 2 / -1;
    }
    .pdf-status {
      justify-self: start;
    }
    .pdf-actions {
      grid-column: 1 / -1;
      justify-content: flex-end;
    }
  }
  @media (max-width: 820px) {
    main {
      padding: 0;
    }
    .toolbar {
      grid-template-columns: 1fr;
    }
  }
  .preview-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    cursor: zoom-out;
  }
  .preview-modal[hidden] {
    display: none;
  }
  .preview-modal img {
    max-width: 100%;
    max-height: 100%;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    cursor: default;
  }
</style>
<link rel="stylesheet" href="../assets/common.css">
</head>
<body class="tool-page">
<div id="header-controls" hidden>
  <button class="button accent" id="download-all-btn" type="button" disabled>
    <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>

  <div id="bulk-progress-track" class="bulk-progress-track" aria-hidden="true">

  </div>
  <span class="bulk-progress-sep" aria-hidden="true">·</span>
  <span id="bulk-progress-percent" class="bulk-progress-stat bulk-progress-percent">0%</span>
  <span class="bulk-progress-sep" aria-hidden="true">·</span>
  <span id="bulk-progress-time" class="bulk-progress-stat bulk-progress-time">00:00:00</span>
  <span class="bulk-progress-sep" aria-hidden="true">·</span>

<main>
  <div id="foreground-hint" class="foreground-hint" hidden>
    <svg class="hint-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 16v-4"/>
      <path d="M12 8h.01"/>
    </svg>
    <span>提示：请尽量保持此页面在前台，否则浏览器可能降低处理速度。</span>

  <section class="panel upload-panel">
    <div class="form">

        <div class="file-drop-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v12"></path>
            <path d="m7 9 5-5 5 5"></path>
            <path d="M5 18v2h14v-2"></path>
          </svg>
        </div>
        <div>
          <div id="pdf-to-image-drop-title" class="file-drop-title"></div>
        </div>
        <div id="pdf-to-image-drop-status" class="file-drop-status" hidden></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = '../vendor/pdfjs/pdf.worker.min.js';

(() => {
  const headerControlsHost = document.getElementById('header-controls');
  const { headerEl, clearBtn } = ToolHeader.mount({
    title: 'PDF 转图片版',
    controls: Array.from(headerControlsHost.children),
    clearButton: { onClear: () => clearAll() },
  });
  headerControlsHost.remove();

  const bulkProgress = document.getElementById('bulk-progress');
  const headerActionsEl = headerEl.querySelector('.header-actions');
  if (headerActionsEl) headerActionsEl.before(bulkProgress);
  else headerEl.appendChild(bulkProgress);

  const fileInput = document.getElementById('pdf-file');
  const dropHint = document.getElementById('drop-hint');
  const dropStatus = document.getElementById('pdf-to-image-drop-status');
  const addPdfBtn = document.getElementById('add-pdf-btn');
  const downloadAllBtn = document.getElementById('download-all-btn');
  const bulkProgressCount = document.getElementById('bulk-progress-count');
  const bulkProgressBar = document.getElementById('bulk-progress-bar');
  const bulkProgressPercent = document.getElementById('bulk-progress-percent');
  const bulkProgressTime = document.getElementById('bulk-progress-time');
  const bulkProgressSpeed = document.getElementById('bulk-progress-speed');
  const bulkProgressMeta = document.getElementById('bulk-progress-meta');
  const bulkProgressMetaSep = document.getElementById('bulk-progress-meta-sep');
  const foregroundHint = document.getElementById('foreground-hint');
  const pdfList = document.getElementById('pdf-list');
  const logEl = document.getElementById('log');
  const RENDER_SCALE = 2;
  const GENERATE_ALL_CONCURRENCY = 4;

  /** @type {{id:string, file:File, status:string, outputBlob:Blob|null, outputName:string, compareUrl:string, error:string, elements:any}[]} */
  let items = [];
  let nextItemId = 1;
  let isGenerating = false;
  let dropZone = null;

  function log(message, isError = false) {
    if (!logEl) return;
    logEl.textContent = message;
    logEl.classList.toggle('error', isError);
  }

  function isPdfFile(file) {
    return Boolean(file) && (
      file.type === 'application/pdf' ||
      /\.pdf$/i.test(file.name || '')
    );
  }

  function makeOutputName(fileName) {
    const baseName = (fileName || 'converted').replace(/\.pdf$/i, '');
    return `${baseName}-images.pdf`;
  }

  function updateGlobalControls() {
    const hasItems = items.length > 0;
    const hasGenerated = items.some((item) => item.outputBlob);
    if (dropZone) dropZone.setHasItems(hasItems);
    downloadAllBtn.disabled = !hasGenerated || isGenerating;
    pdfList.hidden = !hasItems;
    clearBtn.setEnabled(hasItems && !isGenerating);
    foregroundHint.hidden = !isGenerating;
    renderBulkProgress();
  }

  const bulkProgressState = {
    activeMs: 0,
    sessionStartedAt: null,
  };
  let bulkTickerHandle = null;

  function getBulkElapsedMs() {
    let ms = bulkProgressState.activeMs;
    if (bulkProgressState.sessionStartedAt) {
      ms += Date.now() - bulkProgressState.sessionStartedAt;
    }
    return ms;
  }

  function ensureBulkTicker() {
    const active = !!bulkProgressState.sessionStartedAt;
    if (active && !bulkTickerHandle) {
      bulkTickerHandle = setInterval(renderBulkProgress, 1000);
    } else if (!active && bulkTickerHandle) {
      clearInterval(bulkTickerHandle);
      bulkTickerHandle = null;
    }
  }

  function hideBulkProgress() {
    bulkProgressState.activeMs = 0;
    bulkProgressState.sessionStartedAt = null;
    ensureBulkTicker();
    bulkProgress.classList.remove('is-done');
    bulkProgressCount.textContent = '0 / 0';
    bulkProgressBar.style.width = '0%';
    bulkProgressPercent.textContent = '0%';
    bulkProgressTime.textContent = '00:00:00';
    bulkProgressSpeed.textContent = '0.00 个/秒';
    bulkProgressMeta.textContent = '';
    bulkProgressMetaSep.hidden = true;
    bulkProgress.hidden = true;
  }

  function formatDuration(milliseconds) {
    const totalSeconds = Math.max(0, Math.round(milliseconds / 1000));
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    if (!minutes) return `${seconds}s`;
    const hours = Math.floor(minutes / 60);
    const remainingMinutes = minutes % 60;
    if (!hours) return `${minutes}m ${seconds}s`;
    return `${hours}h ${remainingMinutes}m ${seconds}s`;
  }

  function renderBulkProgress() {
    const total = items.length;
    if (!total) {
      bulkProgress.hidden = true;
      return;
    }
    const completed = items.filter((item) => item.status === 'generated' || item.status === 'error').length;
    const failed = items.filter((item) => item.status === 'error').length;
    const successful = completed - failed;
    const elapsed = getBulkElapsedMs();
    const speed = elapsed > 0 ? completed / (elapsed / 1000) : 0;
    const speedText = `${speed.toFixed(2)} 个/秒`;
    bulkProgress.hidden = false;

    const isDone = completed === total && !bulkProgressState.sessionStartedAt;
    bulkProgress.classList.toggle('is-done', isDone);

    if (isDone) {
      let summary = `已转换 ${successful} 个 PDF · ${formatDuration(elapsed)} · ${speedText}`;
      if (failed) summary += ` · 失败 ${failed}`;
      bulkProgressMeta.textContent = summary;
      bulkProgressMetaSep.hidden = true;
      return;
    }

    bulkProgressCount.textContent = `${completed} / ${total}`;
    const percent = total ? Math.round((completed / total) * 100) : 0;
    bulkProgressBar.style.width = `${percent}%`;
    bulkProgressPercent.textContent = `${percent}%`;
    bulkProgressTime.textContent = formatHms(elapsed);
    bulkProgressSpeed.textContent = speedText;
    bulkProgressMeta.textContent = failed ? `失败 ${failed}` : '';
    bulkProgressMetaSep.hidden = !failed;
  }

  function clearAll() {
    if (isGenerating || !items.length) return;
    items.forEach((item) => item.elements.row.remove());
    items = [];
    hideBulkProgress();
    log('已清空全部 PDF。');
    updateGlobalControls();
  }

  const DOWNLOAD_ICON_SVG = '<svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  const COMPARE_ICON_SVG = '<svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>';

  function formatFileSize(bytes) {
    if (!Number.isFinite(bytes) || bytes < 0) return '';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    if (bytes < 1024 * 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    return `${(bytes / (1024 * 1024 * 1024)).toFixed(2)} GB`;
  }

  function formatHms(milliseconds) {
    const totalSeconds = Math.max(0, Math.floor(milliseconds / 1000));
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }

  const STATUS_LABELS = {
    pending: '排队中',
    generating: '转换中',
    generated: '已完成',
    error: '失败',
  };

  function getItemElapsedMs(item) {
    if (!item.startedAt) return 0;
    const endedAt = item.endedAt || Date.now();
    return Math.max(0, endedAt - item.startedAt);
  }

  function getItemSpeed(item, completedPages) {
    const elapsedMs = getItemElapsedMs(item);
    if (elapsedMs <= 0 || !completedPages) return 0;
    return completedPages / (elapsedMs / 1000);
  }

  function renderItemMeta(item) {
    const sizeText = formatFileSize(item.fileSize);
    const parts = [];
    if (item.pageCount != null) parts.push(`${item.pageCount} 页`);
    if (sizeText) parts.push(sizeText);
    item.elements.meta.textContent = parts.join(' · ');
  }

  function renderItemStatus(item) {
    const statusEl = item.elements.status;
    statusEl.textContent = STATUS_LABELS[item.status] || '';
    statusEl.classList.toggle('is-converting', item.status === 'generating');
    statusEl.classList.toggle('is-done', item.status === 'generated');
    statusEl.classList.toggle('is-error', item.status === 'error');
  }

  function renderItemProgress(item) {
    const progressEl = item.elements.progress;
    progressEl.classList.toggle('is-error', item.status === 'error');
    progressEl.innerHTML = '';

    if (item.status === 'generating') {
      const total = item.pageCount || 0;
      const current = item.currentPage || 0;
      const percent = total ? Math.min(100, Math.round((current / total) * 100)) : 0;
      const label = document.createElement('div');
      label.className = 'pdf-progress-label';
      label.textContent = total ? `${current} / ${total} 页` : `第 ${current} 页`;
      const row = document.createElement('div');
      row.className = 'pdf-progress-row';
      const bar = document.createElement('div');
      bar.className = 'pdf-progress-bar';
      const fill = document.createElement('div');
      fill.className = 'pdf-progress-bar-fill';
      fill.style.width = `${percent}%`;
      bar.appendChild(fill);
      const percentEl = document.createElement('span');
      percentEl.className = 'pdf-progress-percent';
      percentEl.textContent = `${percent}%`;
      row.appendChild(bar);
      row.appendChild(percentEl);
      progressEl.appendChild(label);
      progressEl.appendChild(row);
      return;
    }

    if (item.status === 'generated') {
      const total = item.pageCount || 0;
      const primary = document.createElement('div');
      primary.className = 'pdf-progress-line is-primary';
      primary.textContent = `已转换 ${total} 页`;
      const sub = document.createElement('div');
      sub.className = 'pdf-progress-line';
      const sizeText = formatFileSize(item.outputSize);
      sub.textContent = sizeText ? `${total} 页 · ${sizeText}` : `${total} 页`;
      progressEl.appendChild(primary);
      progressEl.appendChild(sub);
      return;
    }

    if (item.status === 'error') {
      const line = document.createElement('div');
      line.className = 'pdf-progress-line';
      line.textContent = item.error || '转换失败';
      progressEl.appendChild(line);
    }
  }

  function renderItemSpeed(item) {
    const speedEl = item.elements.speed;
    speedEl.innerHTML = '';

    if (item.status === 'generating') {
      const time = document.createElement('div');
      time.className = 'pdf-speed-line is-primary';
      time.textContent = formatHms(getItemElapsedMs(item));
      const completed = Math.max(0, (item.currentPage || 0) - 1);
      const speed = getItemSpeed(item, completed);
      const rate = document.createElement('div');
      rate.className = 'pdf-speed-line';
      rate.textContent = `${speed.toFixed(2)} 页/秒`;
      speedEl.appendChild(time);
      speedEl.appendChild(rate);
      return;
    }

    if (item.status === 'generated') {
      const totalPages = item.pageCount || 0;
      const time = document.createElement('div');
      time.className = 'pdf-speed-line is-primary';
      time.textContent = formatHms(getItemElapsedMs(item));
      const speed = getItemSpeed(item, totalPages);
      const rate = document.createElement('div');
      rate.className = 'pdf-speed-line';
      rate.textContent = `${speed.toFixed(2)} 页/秒`;
      speedEl.appendChild(time);
      speedEl.appendChild(rate);
    }
  }

  function renderItemActions(item) {
    item.elements.deleteBtn.disabled = item.status === 'generating';
    item.elements.downloadBtn.disabled = !item.outputBlob;
    item.elements.compareBtn.disabled = !item.outputBlob;
  }

  function renderItem(item) {
    renderItemMeta(item);
    renderItemStatus(item);
    renderItemProgress(item);
    renderItemSpeed(item);
    renderItemActions(item);
  }

  let convertingTickHandle = null;
  function ensureConvertingTicker() {
    const hasConverting = items.some((item) => item.status === 'generating');
    if (hasConverting && !convertingTickHandle) {
      convertingTickHandle = setInterval(() => {
        items.forEach((item) => {
          if (item.status === 'generating') renderItemSpeed(item);
        });
      }, 500);
    } else if (!hasConverting && convertingTickHandle) {
      clearInterval(convertingTickHandle);
      convertingTickHandle = null;
    }
  }

  function setItemStatus(item, status, error = '') {
    item.status = status;
    item.error = status === 'error' ? error : '';
    renderItem(item);
    ensureConvertingTicker();
    updateGlobalControls();
  }

  function getDisplayPathSeparator() {
    return /Win/i.test(navigator.platform || navigator.userAgent || '') ? '\\' : '/';
  }

  function getPdfDisplayName(file, fileEntry) {
    const relativePath = fileEntry && fileEntry.relativePath;
    if (!relativePath || relativePath === file.name) return file.name || '未命名 PDF';
    return relativePath.split('/').filter(Boolean).join(getDisplayPathSeparator());
  }

  function getPdfOutputPath(file, fileEntry, outputName) {
    const relativePath = fileEntry && fileEntry.relativePath;
    if (!relativePath || relativePath === file.name) return outputName;
    const parts = relativePath.split('/').filter(Boolean);
    parts[parts.length - 1] = outputName;
    return parts.join('/');
  }

  function addPdfFiles(files, sourceLabel, fileEntries = []) {
    const entryByFile = new Map(fileEntries.map((entry) => [entry.file, entry]));
    const pdfFiles = Array.from(files || []).filter(isPdfFile);
    if (!pdfFiles.length) {
      log(`${sourceLabel}的文件不是 PDF，请使用 .pdf 文件。`, true);
      return;
    }

    pdfFiles.forEach((file) => addPdfItem(file, entryByFile.get(file)));
    log(`已${sourceLabel} ${pdfFiles.length} 个 PDF，开始自动转换。`);
    updateGlobalControls();
    if (!isGenerating) generateAll();
  }

  function addPdfItem(file, fileEntry) {
    const displayName = getPdfDisplayName(file, fileEntry);
    const outputName = makeOutputName(file.name);
    const item = {
      id: `pdf-item-${nextItemId++}`,
      file,
      fileEntry,
      displayName,
      fileSize: file.size,
      pageCount: null,
      currentPage: 0,
      startedAt: null,
      endedAt: null,
      outputSize: null,
      status: 'pending',
      outputBlob: null,
      outputName,
      outputPath: getPdfOutputPath(file, fileEntry, outputName),
      compareUrl: '',
      error: '',
      elements: {},
    };

    const row = document.createElement('div');
    row.className = 'pdf-item';
    row.dataset.itemId = item.id;

    const thumb = document.createElement('div');
    thumb.className = 'pdf-thumb';
    thumb.textContent = '...';

    const info = document.createElement('div');
    info.className = 'pdf-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'pdf-name';
    nameEl.textContent = displayName;
    nameEl.title = nameEl.textContent;

    const metaEl = document.createElement('div');
    metaEl.className = 'pdf-meta';

    info.appendChild(nameEl);
    info.appendChild(metaEl);

    const statusEl = document.createElement('div');
    statusEl.className = 'pdf-status';

    const progressEl = document.createElement('div');
    progressEl.className = 'pdf-progress';

    const speedEl = document.createElement('div');
    speedEl.className = 'pdf-speed';

    const actions = document.createElement('div');
    actions.className = 'pdf-actions';

    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'button accent';
    downloadBtn.type = 'button';
    downloadBtn.innerHTML = `${DOWNLOAD_ICON_SVG}<span>下载</span>`;
    downloadBtn.disabled = true;

    const compareBtn = document.createElement('button');
    compareBtn.className = 'button';
    compareBtn.type = 'button';
    compareBtn.innerHTML = `${COMPARE_ICON_SVG}<span>对比</span>`;
    compareBtn.disabled = true;

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'icon-btn icon-close delete-item-btn';
    deleteBtn.type = 'button';
    deleteBtn.title = `移除 ${displayName}`;
    deleteBtn.setAttribute('aria-label', deleteBtn.title);

    actions.appendChild(downloadBtn);
    actions.appendChild(compareBtn);
    actions.appendChild(deleteBtn);
    row.appendChild(thumb);
    row.appendChild(info);
    row.appendChild(statusEl);
    row.appendChild(progressEl);
    row.appendChild(speedEl);
    row.appendChild(actions);
    pdfList.appendChild(row);

    item.elements = {
      row,
      thumb,
      meta: metaEl,
      status: statusEl,
      progress: progressEl,
      speed: speedEl,
      downloadBtn,
      compareBtn,
      deleteBtn,
    };
    items.push(item);

    downloadBtn.addEventListener('click', () => {
      if (item.outputBlob) downloadBlob(item.outputBlob, item.outputName);
    });
    compareBtn.addEventListener('click', () => {
      openCompareForItem(item);
    });
    deleteBtn.addEventListener('click', () => removePdfItem(item));
    thumb.addEventListener('click', () => {
      if (item.previewUrl) openPreview(item.previewUrl);
    });

    renderItem(item);
    parseItemMetadata(item);
  }

  async function parseItemMetadata(item) {
    if (item.pageCount != null) return;
    let pdf = null;
    try {
      const arrayBuffer = await item.file.arrayBuffer();
      if (item.pageCount != null) return;
      pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
      if (item.pageCount == null) {
        item.pageCount = pdf.numPages;
        renderItemMeta(item);
      }
    } catch (error) {
      console.warn('parse pdf metadata failed', error);
    } finally {
      if (pdf) {
        try { await pdf.destroy(); } catch (_) {}
      }
    }
  }

  function scaleCanvasToDataUrl(sourceCanvas, maxWidth, maxHeight, quality) {
    const ratio = Math.min(maxWidth / sourceCanvas.width, maxHeight / sourceCanvas.height, 1);
    const width = Math.max(1, Math.round(sourceCanvas.width * ratio));
    const height = Math.max(1, Math.round(sourceCanvas.height * ratio));
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const context = canvas.getContext('2d', { alpha: false });
    context.fillStyle = '#fff';
    context.fillRect(0, 0, width, height);
    context.drawImage(sourceCanvas, 0, 0, width, height);
    return canvas.toDataURL('image/jpeg', quality);
  }

  function setThumbnailFromCanvas(item, sourceCanvas) {
    try {
      const dpr = window.devicePixelRatio || 1;
      const thumbUrl = scaleCanvasToDataUrl(sourceCanvas, 56 * dpr, 56 * dpr, 0.8);
      const img = document.createElement('img');
      img.alt = '';
      img.src = thumbUrl;
      item.elements.thumb.textContent = '';
      item.elements.thumb.appendChild(img);
    } catch (error) {
      console.warn('thumbnail failed', error);
      item.elements.thumb.textContent = '—';
    }

    try {
      item.previewUrl = scaleCanvasToDataUrl(sourceCanvas, 1200, 1600, 0.85);
      item.elements.thumb.classList.add('is-clickable');
    } catch (error) {
      console.warn('preview failed', error);
    }
  }

  const previewModal = document.getElementById('preview-modal');
  const previewModalImg = document.getElementById('preview-modal-img');
  function openPreview(dataUrl) {
    if (!dataUrl) return;
    previewModalImg.src = dataUrl;
    previewModal.hidden = false;
  }
  function closePreview() {
    if (previewModal.hidden) return;
    previewModal.hidden = true;
    previewModalImg.removeAttribute('src');
  }
  previewModal.addEventListener('click', (event) => {
    if (event.target === previewModal) closePreview();
  });
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && !previewModal.hidden) {
      closePreview();
    }
  });

  function removePdfItem(item) {
    if (!item || item.status === 'generating') return;
    items = items.filter((entry) => entry !== item);
    item.elements.row.remove();
    log(`已移除：${item.displayName || item.file.name || '未命名 PDF'}`);
    updateGlobalControls();
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  const ZIP_MAX_32BIT_SIZE = 0xffffffff;
  let crc32Table = null;

  function getCrc32Table() {
    if (crc32Table) return crc32Table;
    crc32Table = new Uint32Array(256);
    for (let index = 0; index < 256; index += 1) {
      let value = index;
      for (let bit = 0; bit < 8; bit += 1) {
        value = (value & 1) ? (0xedb88320 ^ (value >>> 1)) : (value >>> 1);
      }
      crc32Table[index] = value >>> 0;
    }
    return crc32Table;
  }

  function calculateCrc32(buffer) {
    const table = getCrc32Table();
    const bytes = new Uint8Array(buffer);
    let crc = 0xffffffff;
    for (let index = 0; index < bytes.length; index += 1) {
      crc = table[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  function getZipDateTime(date = new Date()) {
    const year = Math.max(1980, date.getFullYear());
    return {
      time: (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2),
      date: ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate(),
    };
  }

  function normalizeZipPath(value, fallbackName) {
    const path = String(value || fallbackName || 'converted.pdf')
      .replace(/\\/g, '/')
      .split('/')
      .filter((part) => part && part !== '.' && part !== '..')
      .join('/');
    return path || fallbackName || 'converted.pdf';
  }

  function makeUniqueZipPaths(entries) {
    const seen = new Map();
    return entries.map((entry) => {
      const normalizedPath = normalizeZipPath(entry.path, entry.name);
      const count = seen.get(normalizedPath) || 0;
      seen.set(normalizedPath, count + 1);
      if (!count) return Object.assign({}, entry, { path: normalizedPath });

      const slashIndex = normalizedPath.lastIndexOf('/');
      const directory = slashIndex >= 0 ? normalizedPath.slice(0, slashIndex + 1) : '';
      const fileName = slashIndex >= 0 ? normalizedPath.slice(slashIndex + 1) : normalizedPath;
      const dotIndex = fileName.lastIndexOf('.');
      const baseName = dotIndex > 0 ? fileName.slice(0, dotIndex) : fileName;
      const extension = dotIndex > 0 ? fileName.slice(dotIndex) : '';
      return Object.assign({}, entry, {
        path: `${directory}${baseName} (${count + 1})${extension}`,
      });
    });
  }

  function createLocalFileHeader(nameBytes, crc32, size, zipTime, zipDate) {
    const header = new Uint8Array(30 + nameBytes.length);
    const view = new DataView(header.buffer);
    view.setUint32(0, 0x04034b50, true);
    view.setUint16(4, 20, true);
    view.setUint16(6, 0x0800, true);
    view.setUint16(8, 0, true);
    view.setUint16(10, zipTime, true);
    view.setUint16(12, zipDate, true);
    view.setUint32(14, crc32, true);
    view.setUint32(18, size, true);
    view.setUint32(22, size, true);
    view.setUint16(26, nameBytes.length, true);
    view.setUint16(28, 0, true);
    header.set(nameBytes, 30);
    return header;
  }

  function createCentralDirectoryHeader(nameBytes, crc32, size, offset, zipTime, zipDate) {
    const header = new Uint8Array(46 + nameBytes.length);
    const view = new DataView(header.buffer);
    view.setUint32(0, 0x02014b50, true);
    view.setUint16(4, 20, true);
    view.setUint16(6, 20, true);
    view.setUint16(8, 0x0800, true);
    view.setUint16(10, 0, true);
    view.setUint16(12, zipTime, true);
    view.setUint16(14, zipDate, true);
    view.setUint32(16, crc32, true);
    view.setUint32(20, size, true);
    view.setUint32(24, size, true);
    view.setUint16(28, nameBytes.length, true);
    view.setUint16(30, 0, true);
    view.setUint16(32, 0, true);
    view.setUint16(34, 0, true);
    view.setUint16(36, 0, true);
    view.setUint32(38, 0, true);
    view.setUint32(42, offset, true);
    header.set(nameBytes, 46);
    return header;
  }

  async function createZipBlob(entries) {
    const encoder = new TextEncoder();
    const localParts = [];
    const centralParts = [];
    const zipEntries = makeUniqueZipPaths(entries);
    let offset = 0;

    for (const entry of zipEntries) {
      const blob = entry.blob;
      if (blob.size > ZIP_MAX_32BIT_SIZE || offset > ZIP_MAX_32BIT_SIZE) {
        throw new Error('ZIP 文件过大，浏览器端暂不支持超过 4GB 的打包。');
      }

      const nameBytes = encoder.encode(entry.path);
      const { time, date } = getZipDateTime();
      const crc32 = calculateCrc32(await blob.arrayBuffer());
      const localHeader = createLocalFileHeader(nameBytes, crc32, blob.size, time, date);
      const centralHeader = createCentralDirectoryHeader(nameBytes, crc32, blob.size, offset, time, date);

      localParts.push(localHeader, blob);
      centralParts.push(centralHeader);
      offset += localHeader.byteLength + blob.size;
    }

    const centralDirectorySize = centralParts.reduce((total, part) => total + part.byteLength, 0);
    const end = new Uint8Array(22);
    const view = new DataView(end.buffer);
    view.setUint32(0, 0x06054b50, true);
    view.setUint16(8, zipEntries.length, true);
    view.setUint16(10, zipEntries.length, true);
    view.setUint32(12, centralDirectorySize, true);
    view.setUint32(16, offset, true);
    view.setUint16(20, 0, true);

    return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
  }

  function openPdfsDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('f-tools-pdfs', 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains('pdfs')) {
          db.createObjectStore('pdfs', { keyPath: 'id' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function putPdfs(record) {
    const db = await openPdfsDb();
    try {
      await new Promise((resolve, reject) => {
        const tx = db.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put(record);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    } finally {
      db.close();
    }
  }

  function makePdfsId() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  }

  async function storeForCompare(sourceFile, outputBlob, outputName) {
    const id = makePdfsId();
    await putPdfs({
      id,
      createdAt: Date.now(),
      files: [
        {
          name: sourceFile.name,
          type: sourceFile.type || 'application/pdf',
          blob: sourceFile.slice(0, sourceFile.size, sourceFile.type || 'application/pdf'),
        },
        {
          name: outputName,
          type: 'application/pdf',
          blob: outputBlob,
        },
      ],
    });
    return `pdf-compare.html?from=pdf-to-image.html&pdfs=${encodeURIComponent(id)}`;
  }

  async function openCompareForItem(item) {
    if (!item.outputBlob) return;
    item.elements.compareBtn.disabled = true;
    try {
      const url = await storeForCompare(item.file, item.outputBlob, item.outputName);
      window.open(url, '_blank', 'noopener');
    } catch (error) {
      console.error('open compare failed', error);
      log('打开对比页失败：' + (error && error.message ? error.message : String(error)), true);
    } finally {
      item.elements.compareBtn.disabled = !item.outputBlob;
    }
  }

  async function renderPageToImage(page, scale) {
    const outputViewport = page.getViewport({ scale: 1 });
    const renderViewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { alpha: false });

    canvas.width = Math.ceil(renderViewport.width);
    canvas.height = Math.ceil(renderViewport.height);

    context.fillStyle = '#fff';
    context.fillRect(0, 0, canvas.width, canvas.height);

    await page.render({
      canvasContext: context,
      viewport: renderViewport,
      background: 'white',
    }).promise;

    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

    return {
      dataUrl,
      width: outputViewport.width,
      height: outputViewport.height,
      canvas,
    };
  }

  function createAbortError() {
    const error = new Error('已停止转换。');
    error.name = 'AbortError';
    return error;
  }

  function isAbortError(error) {
    return error && error.name === 'AbortError';
  }

  function throwIfCancelled(shouldCancel) {
    if (typeof shouldCancel === 'function' && shouldCancel()) throw createAbortError();
  }

  async function convertPdfToImagePdf(file, onProgress, shouldCancel, onFirstPageCanvas) {
    throwIfCancelled(shouldCancel);
    const arrayBuffer = await file.arrayBuffer();
    throwIfCancelled(shouldCancel);
    const sourcePdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
    const { jsPDF } = window.jspdf;
    let outputPdf = null;

    try {
      for (let pageNumber = 1; pageNumber <= sourcePdf.numPages; pageNumber += 1) {
        throwIfCancelled(shouldCancel);
        onProgress(pageNumber, sourcePdf.numPages);

        const page = await sourcePdf.getPage(pageNumber);
        throwIfCancelled(shouldCancel);
        const image = await renderPageToImage(page, RENDER_SCALE);
        throwIfCancelled(shouldCancel);
        if (pageNumber === 1 && typeof onFirstPageCanvas === 'function') {
          try { onFirstPageCanvas(image.canvas); } catch (_) {}
        }
        const orientation = image.width > image.height ? 'landscape' : 'portrait';

        if (!outputPdf) {
          outputPdf = new jsPDF({
            unit: 'pt',
            format: [image.width, image.height],
            orientation,
            compress: true,
          });
        } else {
          outputPdf.addPage([image.width, image.height], orientation);
        }

        outputPdf.addImage(
          image.dataUrl,
          'JPEG',
          0,
          0,
          image.width,
          image.height,
          undefined,
          'FAST'
        );
      }

      throwIfCancelled(shouldCancel);
      return outputPdf.output('blob');
    } finally {
      try { await sourcePdf.destroy(); } catch (_) {}
    }
  }

  function saveGeneratedResult(item, blob) {
    item.outputBlob = blob;
    item.outputSize = blob.size;
    item.outputName = makeOutputName(item.file.name);
    item.outputPath = getPdfOutputPath(item.file, item.fileEntry, item.outputName);
  }

  async function generateAll() {
    if (isGenerating) return;
    const hasPending = items.some((item) => !item.outputBlob && item.status !== 'error');
    if (!hasPending) return;

    isGenerating = true;
    const concurrency = GENERATE_ALL_CONCURRENCY;
    let completedCount = 0;
    let activeCount = 0;
    let failedCount = 0;
    const processed = new Set();

    function getPendingCount() {
      return items.filter((item) => !item.outputBlob && item.status !== 'error' && !processed.has(item)).length;
    }

    function getTotal() {
      return completedCount + activeCount + getPendingCount();
    }

    function pickNextItem() {
      return items.find((item) => !item.outputBlob && item.status !== 'error' && !processed.has(item)) || null;
    }

    bulkProgressState.sessionStartedAt = Date.now();
    ensureBulkTicker();
    updateGlobalControls();
    log(`开始自动转换，并发 ${concurrency}。`);

    async function runNext() {
      while (true) {
        const item = pickNextItem();
        if (!item) return;
        processed.add(item);
        item.outputBlob = null;
        item.outputSize = null;
        item.compareUrl = '';
        item.currentPage = 0;
        item.endedAt = null;
        item.startedAt = Date.now();
        activeCount += 1;
        setItemStatus(item, 'generating');
        log(`正在转换：${item.file.name}`);
        renderBulkProgress();

        try {
          const blob = await convertPdfToImagePdf(item.file, (pageNumber, pageCount) => {
            item.pageCount = pageCount;
            item.currentPage = pageNumber;
            renderItemMeta(item);
            renderItemProgress(item);
            renderItemSpeed(item);
            log(`${item.file.name}\n转换中：第 ${pageNumber} / ${pageCount} 页`);
          }, () => false, (canvas) => setThumbnailFromCanvas(item, canvas));
          item.endedAt = Date.now();
          item.currentPage = item.pageCount || item.currentPage;
          saveGeneratedResult(item, blob);
          setItemStatus(item, 'generated');
        } catch (error) {
          console.error(error);
          item.endedAt = Date.now();
          failedCount += 1;
          setItemStatus(item, 'error', '转换失败：' + (error && error.message ? error.message : String(error)));
        } finally {
          activeCount -= 1;
          completedCount += 1;
          renderBulkProgress();
          log(`已完成 ${completedCount} 个 PDF。`);
        }
      }
    }

    try {
      await Promise.all(Array.from({ length: concurrency }, runNext));
      log(failedCount ? '转换完成（有失败）。' : '转换完成。');
    } finally {
      isGenerating = false;
      if (bulkProgressState.sessionStartedAt) {
        bulkProgressState.activeMs += Date.now() - bulkProgressState.sessionStartedAt;
        bulkProgressState.sessionStartedAt = null;
      }
      ensureBulkTicker();
      items.forEach((item) => renderItemActions(item));
      updateGlobalControls();
    }
  }

  async function downloadAllGenerated() {
    if (isGenerating) return;
    const generatedItems = items.filter((item) => item.outputBlob);
    if (!generatedItems.length) return;

    if (generatedItems.length === 1) {
      const item = generatedItems[0];
      downloadBlob(item.outputBlob, item.outputName);
      log(`已触发下载：${item.outputName}`);
      return;
    }

    downloadAllBtn.disabled = true;
    log(`正在打包 ${generatedItems.length} 个 PDF...`);
    try {
      const zipBlob = await createZipBlob(generatedItems.map((item) => ({
        path: item.outputPath || item.outputName,
        name: item.outputName,
        blob: item.outputBlob,
      })));
      downloadBlob(zipBlob, 'pdf-to-image-results.zip');
      log(`已打包 ${generatedItems.length} 个 PDF，并保留目录结构。`);
    } catch (error) {
      console.error(error);
      log(error && error.message ? error.message : '打包下载失败。', true);
    } finally {
      updateGlobalControls();
    }
  }

  downloadAllBtn.addEventListener('click', downloadAllGenerated);

  dropZone = FileInputDropZone.bind({
    zone: '#drop-hint',
    input: fileInput,
    triggerElement: dropHint,
    triggerButton: addPdfBtn,
    status: dropStatus,
    subject: 'PDF',
    multiple: true,
    onFiles(files, detail) {
      addPdfFiles(files, detail.sourceLabel, detail.fileEntries);
    },
  });

  updateGlobalControls();
})();
</script>
</body>
</html>
