<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图标预览</title>
<script src="../assets/icons/favicons.js"></script>
<script src="../assets/theme-toggle.js"></script>
<script src="../assets/home-link.js"></script>
<script src="../assets/tool-header.js"></script>
<style>
  .icon-gallery {
    width: min(960px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 32px 0 48px;
  }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
  }

  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 24px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--ft-radius-lg);
    box-shadow: var(--shadow);
  }

  .icon-preview {
    --icon-size: 48px;
    color: var(--text);
  }

  .icon-name {
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
  }

  .icon-token {
    color: var(--text-faint);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
  }
</style>
<link rel="stylesheet" href="../assets/common.css">
</head>
<body class="tool-page">
<main>
  <section class="icon-gallery">
    <div class="icon-grid" aria-label="共享图标预览">
      <div class="icon-card">
        <span class="icon-preview icon-home" aria-hidden="true"></span>
        <span class="icon-name">房子</span>
        <span class="icon-token">.icon-home</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-computer" aria-hidden="true"></span>
        <span class="icon-name">电脑</span>
        <span class="icon-token">.icon-computer</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-sun" aria-hidden="true"></span>
        <span class="icon-name">太阳</span>
        <span class="icon-token">.icon-sun</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-moon" aria-hidden="true"></span>
        <span class="icon-name">月亮</span>
        <span class="icon-token">.icon-moon</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-trash" aria-hidden="true"></span>
        <span class="icon-name">垃圾桶</span>
        <span class="icon-token">.icon-trash</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-close" aria-hidden="true"></span>
        <span class="icon-name">叉号</span>
        <span class="icon-token">.icon-close</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-minimize" aria-hidden="true"></span>
        <span class="icon-name">收起</span>
        <span class="icon-token">.icon-minimize</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-chevron-down" aria-hidden="true"></span>
        <span class="icon-name">向下箭头</span>
        <span class="icon-token">.icon-chevron-down</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-menu-check" aria-hidden="true"></span>
        <span class="icon-name">菜单选中</span>
        <span class="icon-token">.icon-menu-check</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-file-drop" aria-hidden="true"></span>
        <span class="icon-name">上传拖放</span>
        <span class="icon-token">.icon-file-drop</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-download" aria-hidden="true"></span>
        <span class="icon-name">下载</span>
        <span class="icon-token">.icon-download</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-compare-split" aria-hidden="true"></span>
        <span class="icon-name">对比分屏</span>
        <span class="icon-token">.icon-compare-split</span>
      </div>
      <div class="icon-card">
        <span class="icon-preview icon-hint-info" aria-hidden="true"></span>
        <span class="icon-name">信息提示</span>
        <span class="icon-token">.icon-hint-info</span>
      </div>
    </div>
  </section>
</main>
<script>
(() => {
  ToolHeader.mount({ title: '图标预览' });
})();
</script>
</body>
</html>
